<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nori — Premium</title>

  <style>
    :root{
      --bg0: #070A12;
      --bg1: #0B1020;
      --glass: rgba(255,255,255,.08);
      --glass2: rgba(255,255,255,.12);
      --text: rgba(245,248,255,1);
      --muted: rgba(182,190,214,.82);
      --border: rgba(255,255,255,.14);

      --a: #22D3EE; /* cyan */
      --b: #A78BFA; /* violet */
      --c: #FB7185; /* rose */
      --g: #34D399; /* green */
      --o: #FB923C; /* orange */

      --r12: 14px;
      --r16: 18px;
      --r20: 22px;
      --r24: 26px;
      --rfull: 9999px;

      --shadow: 0 18px 55px rgba(0,0,0,.45);
      --shadow2: 0 10px 30px rgba(0,0,0,.34);

      --safeT: env(safe-area-inset-top, 0px);
      --safeB: env(safe-area-inset-bottom, 0px);

      --tap: 48px;
      --navH: 78px;

      --maxW: 760px;
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; }

    body{
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 650px at 12% -10%, rgba(34,211,238,.22), transparent 60%),
        radial-gradient(900px 650px at 94% 5%, rgba(167,139,250,.20), transparent 60%),
        radial-gradient(900px 650px at 55% 110%, rgba(251,113,133,.18), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
      -webkit-tap-highlight-color: transparent;
    }

    .wrap{
      max-width: var(--maxW);
      margin: 0 auto;
      padding: 0 14px calc(var(--navH) + var(--safeB) + 16px);
      position: relative;
    }

    /* Top bar */
    .top{
      position: sticky;
      top: 0;
      z-index: 120;
      padding: calc(12px + var(--safeT)) 0 12px;
      margin: 0 -14px;
      padding-left: 14px;
      padding-right: 14px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      background: linear-gradient(180deg, rgba(7,10,18,.78), rgba(7,10,18,.45));
      border-bottom: 1px solid rgba(255,255,255,.10);
    }

    .topRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      gap: 6px;
      min-width:0;
    }

    .brand h1{
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -.02em;
      line-height:1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: linear-gradient(90deg, var(--a), var(--b), var(--c));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .chips{
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 12px;
    }

    .chip{
      display:inline-flex;
      align-items:center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: var(--rfull);
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.06);
      max-width: 100%;
      white-space: nowrap;
    }

    .iconBtn{
      width: var(--tap);
      height: var(--tap);
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: var(--shadow2);
      cursor:pointer;
      user-select:none;
      display:flex;
      align-items:center;
      justify-content:center;
      transition: transform .12s ease, background .12s ease;
    }
    .iconBtn:active{ transform: scale(.98); background: rgba(255,255,255,.09); }
    .iconBtn span{ font-size: 18px; }

    /* Hero */
    .hero{
      margin-top: 12px;
      border-radius: var(--r24);
      border: 1px solid rgba(255,255,255,.14);
      background:
        radial-gradient(900px 360px at 15% 0%, rgba(34,211,238,.18), transparent 60%),
        radial-gradient(900px 360px at 92% 0%, rgba(167,139,250,.16), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      box-shadow: var(--shadow);
      overflow:hidden;
      position:relative;
    }
    .hero::after{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(1000px 220px at 50% -30%, rgba(255,255,255,.12), transparent 62%);
      pointer-events:none;
    }
    .heroIn{
      padding: 16px;
      position:relative;
      z-index: 1;
    }
    .heroTop{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom: 10px;
    }
    .tag{
      font-size: 12px;
      color: rgba(245,248,255,.85);
      font-weight: 900;
      letter-spacing: .02em;
      opacity: .9;
    }
    .pulse{
      width: 10px; height: 10px;
      border-radius: 999px;
      background: rgba(52,211,153,1);
      box-shadow: 0 0 0 0 rgba(52,211,153,.55);
      animation: ping 1.6s infinite;
    }
    @keyframes ping{
      0%{ box-shadow: 0 0 0 0 rgba(52,211,153,.55); }
      70%{ box-shadow: 0 0 0 12px rgba(52,211,153,0); }
      100%{ box-shadow: 0 0 0 0 rgba(52,211,153,0); }
    }

    .heroMain{
      font-size: 32px;
      font-weight: 950;
      letter-spacing: -.03em;
      line-height: 1.04;
      font-variant-numeric: tabular-nums;
      margin-bottom: 8px;
    }
    .heroSub{
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .ctaRow{
      margin-top: 14px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .cta{
      min-height: 62px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      box-shadow: 0 18px 42px rgba(0,0,0,.35);
      cursor:pointer;
      user-select:none;
      padding: 12px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      overflow:hidden;
      transition: transform .12s ease, filter .12s ease;
      position: relative;
    }
    .cta:active{ transform: scale(.985); filter: brightness(.98); }
    .ctaL{
      display:flex; align-items:center; gap: 12px; min-width:0;
    }
    .badge{
      width: 46px; height: 46px;
      border-radius: 16px;
      display:flex; align-items:center; justify-content:center;
      border: 1px solid rgba(255,255,255,.18);
      background: rgba(255,255,255,.06);
      flex-shrink:0;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.12);
    }
    .badge span{ font-size: 22px; }
    .ctaT{
      display:flex; flex-direction:column; gap: 4px;
      min-width:0;
    }
    .ctaT .t{
      font-weight: 950;
      font-size: 15px;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .ctaT .s{
      font-size: 12px;
      color: var(--muted);
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .ctaR{
      font-size: 12px;
      color: rgba(245,248,255,.78);
      font-weight: 900;
      white-space:nowrap;
    }

    .sleepGlow::before, .feedGlow::before{
      content:"";
      position:absolute; inset:-2px;
      background: radial-gradient(700px 180px at 12% 0%, rgba(167,139,250,.30), transparent 60%);
      pointer-events:none;
      opacity:.9;
    }
    .feedGlow::before{
      background: radial-gradient(700px 180px at 12% 0%, rgba(251,113,133,.28), transparent 60%);
    }

    /* Section */
    .section{
      margin-top: 12px;
      border-radius: var(--r24);
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.05);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .secHead{
      padding: 14px 14px 10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    }
    .secTitle{
      font-size: 15px;
      font-weight: 950;
      letter-spacing: -.01em;
    }
    .secLink{
      font-size: 13px;
      font-weight: 950;
      color: rgba(34,211,238,.95);
      cursor:pointer;
      user-select:none;
    }

    .list{
      padding: 12px 14px 14px;
      display:flex;
      flex-direction:column;
      gap: 10px;
    }

    .card{
      display:flex;
      gap: 12px;
      padding: 12px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      box-shadow: 0 16px 40px rgba(0,0,0,.24);
      overflow:hidden;
      position:relative;
    }
    .card::after{
      content:"";
      position:absolute;
      inset:-2px;
      background: radial-gradient(560px 140px at 18% 0%, rgba(255,255,255,.10), transparent 60%);
      pointer-events:none;
      opacity:.7;
    }

    .ico{
      width: 46px; height: 46px;
      border-radius: 16px;
      display:flex;
      align-items:center;
      justify-content:center;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(255,255,255,.06);
      flex-shrink:0;
      position:relative;
      z-index: 1;
    }
    .ico span{ font-size: 22px; }
    .cc{
      flex:1; min-width:0;
      position:relative;
      z-index: 1;
    }
    .ct{
      font-size: 13px;
      font-weight: 950;
      margin-bottom: 4px;
      line-height:1.15;
    }
    .cd{
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      overflow-wrap:anywhere;
    }
    .time{
      font-size: 11px;
      color: rgba(245,248,255,.72);
      white-space:nowrap;
      margin-left: 6px;
      position:relative;
      z-index: 1;
    }

    .rowBtns{
      margin-top: 8px;
      display:flex;
      gap: 8px;
      flex-wrap:wrap;
    }
    .mini{
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: rgba(245,248,255,.92);
      font-weight: 950;
      font-size: 12px;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease;
    }
    .mini:active{ transform: scale(.98); }
    .danger{
      border-color: rgba(251,146,60,.35);
      color: rgba(251,146,60,1);
      background: rgba(251,146,60,.10);
    }

    .empty{
      text-align:center;
      padding: 18px 10px;
      color: var(--muted);
      font-size: 13px;
    }

    /* Bottom nav */
    .nav{
      position: fixed;
      left:0; right:0; bottom:0;
      height: calc(var(--navH) + var(--safeB));
      padding: 10px 10px calc(10px + var(--safeB));
      background: linear-gradient(180deg, rgba(7,10,18,.30), rgba(7,10,18,.92));
      border-top: 1px solid rgba(255,255,255,.10);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      z-index: 220;
    }
    .navIn{
      max-width: var(--maxW);
      margin: 0 auto;
      height: 100%;
      display:flex;
      align-items:center;
      justify-content:space-around;
      gap: 10px;
    }
    .navItem{
      flex:1;
      min-height: var(--tap);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.04);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap: 4px;
      cursor:pointer;
      user-select:none;
      color: rgba(245,248,255,.74);
      transition: transform .12s ease, background .12s ease;
      position: relative;
    }
    .navItem:active{ transform: scale(.985); background: rgba(255,255,255,.07); }
    .navItem.active{
      color: rgba(34,211,238,1);
      background: rgba(34,211,238,.10);
      border-color: rgba(34,211,238,.22);
    }
    .navIco{ font-size: 20px; line-height:1; }
    .navLbl{ font-size: 11px; font-weight: 950; }

    /* Modal */
    .modal{
      display:none;
      position: fixed;
      inset:0;
      background: rgba(0,0,0,.62);
      z-index: 1000;
      padding-bottom: var(--safeB);
      animation: fade .18s ease-out;
    }
    .modal.active{ display:flex; align-items:flex-end; }
    @keyframes fade{ from{opacity:0;} to{opacity:1;} }
    @keyframes up{ from{ transform: translateY(100%);} to{ transform: translateY(0);} }

    .sheet{
      width: 100%;
      max-height: 90vh;
      border-radius: 28px 28px 0 0;
      padding: 18px 16px calc(18px + var(--safeB));
      background:
        radial-gradient(980px 220px at 12% 0%, rgba(34,211,238,.12), transparent 60%),
        radial-gradient(980px 220px at 92% 0%, rgba(167,139,250,.12), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      border-top: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 -24px 70px rgba(0,0,0,.55);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      overflow-y:auto;
      animation: up .22s ease-out;
    }
    .mHead{ display:flex; justify-content:space-between; align-items:center; gap: 12px; margin-bottom: 12px; }
    .mTitle{ font-size: 18px; font-weight: 950; }
    .x{ font-size: 28px; color: rgba(245,248,255,.70); cursor:pointer; user-select:none; line-height:1; }

    .timer{
      padding: 14px;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      margin-bottom: 12px;
      overflow:hidden;
    }
    .timerRow{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 12px;
    }
    .big{
      font-size: 42px;
      font-weight: 950;
      letter-spacing: -.02em;
      font-variant-numeric: tabular-nums;
      background: linear-gradient(90deg, var(--a), var(--b));
      -webkit-background-clip:text;
      background-clip:text;
      color: transparent;
      white-space:nowrap;
    }
    .small{
      font-size: 12px;
      color: var(--muted);
      text-align:right;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      max-width: 56vw;
    }

    .btn{
      width: 100%;
      min-height: calc(var(--tap) + 10px);
      border:none;
      border-radius: 20px;
      cursor:pointer;
      user-select:none;
      font-size: 15px;
      font-weight: 950;
      color: #061018;
      background: linear-gradient(90deg, var(--a), var(--b));
      box-shadow: 0 18px 45px rgba(34,211,238,.10);
      transition: transform .12s ease, filter .12s ease;
    }
    .btn:active{ transform: scale(.985); filter: brightness(.98); }
    .btn.sleep{ background: linear-gradient(90deg, var(--b), rgba(167,139,250,.85)); color:#0b0f1e; }
    .btn.feed{ background: linear-gradient(90deg, var(--c), rgba(251,113,133,.86)); color:#18040a; }
    .btn.stop{ background: linear-gradient(90deg, var(--o), rgba(251,146,60,.88)); color:#140a02; }
    .btn.ok{ background: linear-gradient(90deg, var(--g), rgba(52,211,153,.86)); color:#04110c; }

    .group{ margin-top: 12px; }
    .label{ display:block; font-size: 13px; font-weight: 950; margin-bottom: 8px; color: rgba(245,248,255,.86); }
    .input, .textarea{
      width:100%;
      min-height: var(--tap);
      padding: 12px 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: rgba(245,248,255,.95);
      outline:none;
      font-size: 15px;
    }
    .input:focus, .textarea:focus{
      border-color: rgba(34,211,238,.30);
      box-shadow: 0 0 0 3px rgba(34,211,238,.12);
    }
    .textarea{ min-height: 90px; resize: vertical; font-family: inherit; }

    .togRow{
      display:flex; gap: 10px; flex-wrap:wrap;
      margin-top: 10px;
    }
    .tog{
      flex: 1 1 120px;
      min-width: 120px;
      min-height: var(--tap);
      padding: 12px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: rgba(245,248,255,.92);
      font-weight: 950;
      cursor:pointer;
      user-select:none;
      transition: transform .12s ease, background .12s ease;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .tog:active{ transform: scale(.985); }
    .tog.active{
      background: rgba(34,211,238,.18);
      border-color: rgba(34,211,238,.28);
      color: rgba(34,211,238,1);
    }

    @media (max-width: 360px){
      .ctaRow{ grid-template-columns: 1fr; }
      .big{ font-size: 38px; }
      .heroMain{ font-size: 28px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="top">
      <div class="topRow">
        <div class="brand">
          <h1>Nori Premium</h1>
          <div class="chips">
            <span class="chip">San: <strong id="pillSleep">-</strong></span>
            <span class="chip">Hranjenje: <strong id="pillFeed">-</strong></span>
          </div>
        </div>
        <div style="display:flex; gap:10px;">
          <div class="iconBtn" id="btnExport" title="Export"><span>⬇️</span></div>
          <div class="iconBtn" id="btnSettings" title="Opcije"><span>⚙️</span></div>
        </div>
      </div>
    </div>

    <div class="hero">
      <div class="heroIn">
        <div class="heroTop">
          <div class="tag" id="heroTag">STATUS</div>
          <div class="pulse" id="pulseDot"></div>
        </div>
        <div class="heroMain" id="heroMain">-</div>
        <div class="heroSub" id="heroSub">-</div>

        <div class="ctaRow">
          <div class="cta sleepGlow" id="openSleep">
            <div class="ctaL">
              <div class="badge"><span>😴</span></div>
              <div class="ctaT">
                <div class="t">San</div>
                <div class="s" id="ctaSleepSub">Dodaj / u toku</div>
              </div>
            </div>
            <div class="ctaR" id="ctaSleepR">⟶</div>
          </div>

          <div class="cta feedGlow" id="openFeed">
            <div class="ctaL">
              <div class="badge"><span>🍼</span></div>
              <div class="ctaT">
                <div class="t">Hranjenje</div>
                <div class="s" id="ctaFeedSub">Dodaj / u toku</div>
              </div>
            </div>
            <div class="ctaR" id="ctaFeedR">⟶</div>
          </div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="secHead">
        <div class="secTitle" id="secTitle">Trenutno / posljednje</div>
        <div class="secLink" id="toggleHistory">Historija</div>
      </div>
      <div class="list" id="list"></div>
    </div>
  </div>

  <div class="nav">
    <div class="navIn">
      <div class="navItem active" id="navHome">
        <div class="navIco">🏠</div>
        <div class="navLbl">Početna</div>
      </div>
      <div class="navItem" id="navHistory">
        <div class="navIco">📜</div>
        <div class="navLbl">Historija</div>
      </div>
      <div class="navItem" id="navSleep">
        <div class="navIco">😴</div>
        <div class="navLbl">San</div>
      </div>
      <div class="navItem" id="navFeed">
        <div class="navIco">🍼</div>
        <div class="navLbl">Hranjenje</div>
      </div>
    </div>
  </div>

  <!-- Sleep modal -->
  <div class="modal" id="sleepModal">
    <div class="sheet">
      <div class="mHead">
        <div class="mTitle">San</div>
        <div class="x" data-close="sleepModal">×</div>
      </div>

      <div class="timer" id="sleepTimer" style="display:none;">
        <div class="timerRow">
          <div>
            <div class="big" id="sleepElapsed">00:00:00</div>
            <div class="small" id="sleepMeta">-</div>
          </div>
        </div>
      </div>

      <button class="btn sleep" id="sleepStart">Dijete zaspalo</button>
      <div style="height:10px;"></div>
      <button class="btn stop" id="sleepStop" style="display:none;">Dijete se probudilo</button>

      <div class="group">
        <label class="label">Bilješke (opcionalno)</label>
        <textarea class="textarea" id="sleepNotes" placeholder="npr. zaspao brzo, mirno..."></textarea>
      </div>
    </div>
  </div>

  <!-- Feeding modal -->
  <div class="modal" id="feedModal">
    <div class="sheet">
      <div class="mHead">
        <div class="mTitle">Hranjenje</div>
        <div class="x" data-close="feedModal">×</div>
      </div>

      <div class="timer" id="feedTimer" style="display:none;">
        <div class="timerRow">
          <div>
            <div class="big" id="feedElapsed">00:00:00</div>
            <div class="small" id="feedMeta">-</div>
          </div>
        </div>
      </div>

      <div class="group">
        <label class="label">Dojka</label>
        <div class="togRow" id="breastRow">
          <button class="tog" data-b="left">Lijeva</button>
          <button class="tog" data-b="right">Desna</button>
          <button class="tog" data-b="both">Obje</button>
        </div>
      </div>

      <button class="btn feed" id="feedStart">Počinje jesti</button>
      <div style="height:10px;"></div>
      <button class="btn ok" id="feedStop" style="display:none;">Završio jesti</button>

      <div class="group">
        <label class="label">Bilješke (opcionalno)</label>
        <textarea class="textarea" id="feedNotes" placeholder="npr. pauze, dohrana..."></textarea>
      </div>
    </div>
  </div>

<script>
  // Keep ORIGINAL storage keys from your old app, so it pulls all old data. [file:2]
  const KEY_ACTS = "babyActivities";
  const KEY_ACTIVE_SLEEP = "activeSleep";
  const KEY_ACTIVE_FEED = "activeFeeding";

  const SUPPORTED = new Set(["sleep","feeding"]);
  let activities = safeParse(localStorage.getItem(KEY_ACTS) || "[]", []);
  let activeSleep = safeParse(localStorage.getItem(KEY_ACTIVE_SLEEP) || "null", null);
  let activeFeeding = safeParse(localStorage.getItem(KEY_ACTIVE_FEED) || "null", null);

  let isHistory = false;
  let selectedBreast = null;

  normalizeAll();

  function safeParse(j, f){ try{return JSON.parse(j);}catch{return f;} }
  function uid(){ return "a_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16); }
  function pad2(n){ return String(n).padStart(2,"0"); }
  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }
  function isoToMs(iso){
    const d = new Date(iso);
    const t = d.getTime();
    return Number.isFinite(t) ? t : null;
  }
  function msToISO(ms){ return new Date(ms).toISOString(); }

  function hmsFromMs(ms){
    const total = Math.max(0, Math.floor(ms/1000));
    const h = Math.floor(total/3600);
    const m = Math.floor((total%3600)/60);
    const s = total%60;
    return `${pad2(h)}:${pad2(m)}:${pad2(s)}`;
  }
  function formatStamp(ms){
    const d = new Date(ms);
    return `${pad2(d.getDate())}.${pad2(d.getMonth()+1)}.${d.getFullYear()} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  }
  function timeAgo(ms){
    const diff = Date.now() - ms;
    const sec = Math.floor(diff/1000);
    if(sec < 0) return "u budućnosti";
    if(sec < 5) return "upravo";
    if(sec < 60) return `prije ${sec}s`;
    const min = Math.floor(sec/60);
    if(min < 60) return `prije ${min}m`;
    const hr = Math.floor(min/60);
    if(hr < 24) return `prije ${hr}h`;
    const d = Math.floor(hr/24);
    return `prije ${d}d`;
  }
  function dayKey(ms){
    const d = new Date(ms);
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }

  function saveActs(){ localStorage.setItem(KEY_ACTS, JSON.stringify(activities)); } // old key [file:2]
  function saveActive(){
    if(activeSleep) localStorage.setItem(KEY_ACTIVE_SLEEP, JSON.stringify(activeSleep));
    else localStorage.removeItem(KEY_ACTIVE_SLEEP);
    if(activeFeeding) localStorage.setItem(KEY_ACTIVE_FEED, JSON.stringify(activeFeeding));
    else localStorage.removeItem(KEY_ACTIVE_FEED);
  }

  function normalizeActivity(a){
    if(!a || !a.type) return null;
    if(!a.id) a.id = uid();

    if(!SUPPORTED.has(a.type)) return a;

    if(typeof a.startMs !== "number"){
      const s = isoToMs(a.time || a.startIso || a.startTime);
      if(s) a.startMs = s;
    }
    if(typeof a.endMs !== "number"){
      const e = isoToMs(a.endTime || a.endIso || a.end);
      if(e) a.endMs = e;
    }
    if((!a.endMs || a.endMs <= a.startMs) && a.startMs && a.duration != null){
      if(a.type === "sleep"){
        const hours = Number(a.duration);
        if(Number.isFinite(hours) && hours > 0) a.endMs = a.startMs + Math.round(hours * 3600 * 1000);
      }else{
        const mins = Number(a.duration);
        if(Number.isFinite(mins) && mins > 0) a.endMs = a.startMs + Math.round(mins * 60 * 1000);
      }
    }
    if(a.startMs && !a.startIso) a.startIso = msToISO(a.startMs);
    if(a.endMs && !a.endIso) a.endIso = msToISO(a.endMs);
    if(a.notes == null) a.notes = "";
    if(a.type === "feeding" && !a.breast) a.breast = null;
    if(!a.timestamp) a.timestamp = Date.now();
    return a;
  }
  function normalizeActiveSleep(x){
    if(!x) return null;
    if(typeof x.startMs !== "number"){
      const s = isoToMs(x.startIso);
      if(s) x.startMs = s;
    }
    if(x.startMs && !x.startIso) x.startIso = msToISO(x.startMs);
    if(!x.startDisplay && x.startMs){
      const d = new Date(x.startMs);
      x.startDisplay = d.toLocaleString("bs-BA", {hour:"2-digit", minute:"2-digit"});
    }
    return x.startMs ? x : null;
  }
  function normalizeActiveFeeding(x){
    if(!x) return null;
    if(typeof x.startMs !== "number"){
      const s = isoToMs(x.startIso);
      if(s) x.startMs = s;
    }
    if(x.startMs && !x.startIso) x.startIso = msToISO(x.startMs);
    if(!x.startDisplay && x.startMs){
      const d = new Date(x.startMs);
      x.startDisplay = d.toLocaleString("bs-BA", {day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit"});
    }
    if(!x.breast) x.breast = null;
    return x.startMs ? x : null;
  }
  function normalizeAll(){
    activities = Array.isArray(activities) ? activities.map(normalizeActivity).filter(Boolean) : [];
    activeSleep = normalizeActiveSleep(activeSleep);
    activeFeeding = normalizeActiveFeeding(activeFeeding);
    saveActs();
    saveActive();
  }

  function titleFor(a){
    if(a.type === "sleep") return "San";
    const b = a.breast==="left" ? "Lijeva" : a.breast==="right" ? "Desna" : a.breast==="both" ? "Obje" : "—";
    return `Hranjenje — ${b}`;
  }
  function detailsFor(a){
    const start = formatStamp(a.startMs);
    const end = formatStamp(a.endMs);
    const dur = hmsFromMs(a.endMs - a.startMs);
    const notes = a.notes ? ` • ${escapeHtml(a.notes)}` : "";
    if(a.type==="sleep"){
      return `Start: ${start} • Kraj: ${end} • Trajanje: ${dur} • Budan: ${timeAgo(a.endMs)}${notes}`;
    }
    const b = a.breast==="left" ? "Lijeva" : a.breast==="right" ? "Desna" : a.breast==="both" ? "Obje" : "—";
    return `Start: ${start} • Kraj: ${end} • Trajanje: ${dur} • Dojka: ${b}${notes}`;
  }

  function cardHTML(a){
    const emoji = a.type==="sleep" ? "😴" : "🍼";
    return `
      <div class="card">
        <div class="ico"><span>${emoji}</span></div>
        <div class="cc">
          <div class="ct">${escapeHtml(titleFor(a))}</div>
          <div class="cd">${detailsFor(a)}</div>
          <div class="rowBtns">
            <button class="mini danger" data-del="${a.id}">Obriši</button>
          </div>
        </div>
        <div class="time">${timeAgo(a.startMs)}</div>
      </div>
    `;
  }

  function activeCard(type){
    if(type==="sleep" && activeSleep){
      const el = Date.now() - activeSleep.startMs;
      return `
        <div class="card">
          <div class="ico"><span>😴</span></div>
          <div class="cc">
            <div class="ct">San u toku</div>
            <div class="cd">Počeo: ${formatStamp(activeSleep.startMs)} • Traje: ${hmsFromMs(el)}</div>
          </div>
          <div class="time">sada</div>
        </div>`;
    }
    if(type==="feeding" && activeFeeding){
      const el = Date.now() - activeFeeding.startMs;
      const b = activeFeeding.breast==="left" ? "Lijeva" : activeFeeding.breast==="right" ? "Desna" : activeFeeding.breast==="both" ? "Obje" : "—";
      return `
        <div class="card">
          <div class="ico"><span>🍼</span></div>
          <div class="cc">
            <div class="ct">Hranjenje u toku — ${b}</div>
            <div class="cd">Počelo: ${formatStamp(activeFeeding.startMs)} • Traje: ${hmsFromMs(el)}</div>
          </div>
          <div class="time">sada</div>
        </div>`;
    }
    return "";
  }

  function updatePills(){
    const lastSleep = activities.filter(a=>a.type==="sleep" && a.endMs).sort((a,b)=>b.endMs-a.endMs)[0];
    const lastFeed  = activities.filter(a=>a.type==="feeding" && a.endMs).sort((a,b)=>b.endMs-a.endMs)[0];
    document.getElementById("pillSleep").textContent = lastSleep ? timeAgo(lastSleep.endMs) : "-";
    document.getElementById("pillFeed").textContent  = lastFeed  ? timeAgo(lastFeed.endMs)  : "-";
  }

  function updateHero(){
    const main = document.getElementById("heroMain");
    const sub  = document.getElementById("heroSub");
    const tag  = document.getElementById("heroTag");

    if(activeSleep){
      tag.textContent = "SAN U TOKU";
      main.textContent = `Spava • ${hmsFromMs(Date.now() - activeSleep.startMs)}`;
      sub.textContent  = `Počeo: ${formatStamp(activeSleep.startMs)} (${timeAgo(activeSleep.startMs)})`;
      document.getElementById("ctaSleepSub").textContent = "Zaustavi san";
      document.getElementById("ctaSleepR").textContent = "STOP";
      return;
    }
    if(activeFeeding){
      const b = activeFeeding.breast==="left" ? "Lijeva" : activeFeeding.breast==="right" ? "Desna" : activeFeeding.breast==="both" ? "Obje" : "—";
      tag.textContent = "HRANJENJE U TOKU";
      main.textContent = `Jede (${b}) • ${hmsFromMs(Date.now() - activeFeeding.startMs)}`;
      sub.textContent  = `Počelo: ${formatStamp(activeFeeding.startMs)} • Dojka: ${b}`;
      document.getElementById("ctaFeedSub").textContent = "Završi hranjenje";
      document.getElementById("ctaFeedR").textContent = "STOP";
      return;
    }

    tag.textContent = "STATUS";
    const lastSleep = activities.filter(a=>a.type==="sleep" && a.endMs).sort((a,b)=>b.endMs-a.endMs)[0];
    const awake = lastSleep ? timeAgo(lastSleep.endMs) : "-";
    main.textContent = `Budan • ${awake}`;
    sub.textContent  = `Spreman za novi unos.`;
    document.getElementById("ctaSleepSub").textContent = "Dodaj novi san";
    document.getElementById("ctaSleepR").textContent = "⟶";
    document.getElementById("ctaFeedSub").textContent = "Dodaj hranjenje";
    document.getElementById("ctaFeedR").textContent = "⟶";
  }

  function updateList(){
    const el = document.getElementById("list");
    const title = document.getElementById("secTitle");
    const tgl = document.getElementById("toggleHistory");

    if(!isHistory){
      title.textContent = "Trenutno / posljednje";
      tgl.textContent = "Historija";

      const blocks = [];
      if(activeSleep) blocks.push(activeCard("sleep"));
      if(activeFeeding) blocks.push(activeCard("feeding"));

      const lastSleep = activities.filter(a=>a.type==="sleep" && a.endMs).sort((a,b)=>b.endMs-a.endMs)[0];
      const lastFeed  = activities.filter(a=>a.type==="feeding" && a.endMs).sort((a,b)=>b.endMs-a.endMs)[0];
      if(!activeSleep && lastSleep) blocks.push(cardHTML(lastSleep));
      if(!activeFeeding && lastFeed) blocks.push(cardHTML(lastFeed));

      el.innerHTML = blocks.length ? blocks.join("") : `<div class="empty">Nema aktivnosti.</div>`;
      return;
    }

    title.textContent = "Historija (San/Hranjenje)";
    tgl.textContent = "Početna";

    const sorted = activities.filter(a=>SUPPORTED.has(a.type) && a.startMs && a.endMs).sort((a,b)=>b.startMs-a.startMs);
    if(!sorted.length){ el.innerHTML = `<div class="empty">Nema zapisa.</div>`; return; }

    const groups = {};
    for(const a of sorted){
      const k = dayKey(a.startMs);
      (groups[k] ||= []).push(a);
    }
    const keys = Object.keys(groups).sort((a,b)=>a<b?1:-1);

    el.innerHTML = keys.map(k=>{
      const count = groups[k].length;
      const items = groups[k].map(cardHTML).join("");
      return `
        <div class="card" style="flex-direction:column; gap:10px;">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <div class="ct">${k}</div>
            <div class="time">${count} zapisa</div>
          </div>
          <div style="display:flex; flex-direction:column; gap:10px;">${items}</div>
        </div>
      `;
    }).join("");
  }

  function updateAll(){
    updatePills();
    updateHero();
    updateList();
  }

  // ===== Modals =====
  function openModal(id){
    document.getElementById(id).classList.add("active");
    if(id==="sleepModal") paintSleepModal();
    if(id==="feedModal") paintFeedModal();
  }
  function closeModal(id){ document.getElementById(id).classList.remove("active"); }

  document.querySelectorAll(".modal").forEach(m=>{
    m.addEventListener("click", (e)=>{ if(e.target===m) closeModal(m.id); });
  });
  document.querySelectorAll("[data-close]").forEach(x=>{
    x.addEventListener("click", ()=> closeModal(x.dataset.close));
  });

  // ===== Sleep =====  [file:2]
  function paintSleepModal(){
    if(activeSleep){
      document.getElementById("sleepTimer").style.display = "block";
      document.getElementById("sleepStart").style.display = "none";
      document.getElementById("sleepStop").style.display = "block";
    }else{
      document.getElementById("sleepTimer").style.display = "none";
      document.getElementById("sleepStart").style.display = "block";
      document.getElementById("sleepStop").style.display = "none";
      document.getElementById("sleepNotes").value = "";
    }
  }

  document.getElementById("sleepStart").addEventListener("click", ()=>{
    if(activeSleep) return;
    const ms = Date.now();
    const d = new Date(ms);
    activeSleep = {
      startIso: d.toISOString(),
      startMs: ms,
      startDisplay: d.toLocaleString("bs-BA", {hour:"2-digit", minute:"2-digit"})
    };
    saveActive();
    paintSleepModal();
    updateAll();
  });

  document.getElementById("sleepStop").addEventListener("click", ()=>{
    if(!activeSleep) return;

    const endMs = Date.now();
    const endDate = new Date(endMs);
    const durationHours = (endMs - activeSleep.startMs)/3600000;

    const act = normalizeActivity({
      id: uid(),
      type: "sleep",
      time: activeSleep.startIso,
      endTime: endDate.toISOString(),
      duration: durationHours,
      notes: document.getElementById("sleepNotes").value || "",
      startTimeDisplay: activeSleep.startDisplay,
      endTimeDisplay: endDate.toLocaleString("bs-BA", {hour:"2-digit", minute:"2-digit"}),
      timestamp: Date.now()
    });

    activities.push(act);
    activeSleep = null;
    saveActs();
    saveActive();
    closeModal("sleepModal");
    updateAll();
  });

  // ===== Feeding =====  [file:2]
  function setBreast(b){
    selectedBreast = b;
    document.querySelectorAll("#breastRow .tog").forEach(btn=>{
      btn.classList.toggle("active", btn.dataset.b === b);
    });
  }
  document.querySelectorAll("#breastRow .tog").forEach(btn=>{
    btn.addEventListener("click", ()=> setBreast(btn.dataset.b));
  });

  function paintFeedModal(){
    if(activeFeeding){
      document.getElementById("feedTimer").style.display = "block";
      document.getElementById("feedStart").style.display = "none";
      document.getElementById("feedStop").style.display = "block";
      setBreast(activeFeeding.breast);
    }else{
      document.getElementById("feedTimer").style.display = "none";
      document.getElementById("feedStart").style.display = "block";
      document.getElementById("feedStop").style.display = "none";
      setBreast(null);
      document.getElementById("feedNotes").value = "";
    }
  }

  document.getElementById("feedStart").addEventListener("click", ()=>{
    if(activeFeeding) return;
    if(!selectedBreast) return alert("Odaberi dojku.");
    const ms = Date.now();
    const d = new Date(ms);
    activeFeeding = {
      startIso: d.toISOString(),
      startMs: ms,
      startDisplay: d.toLocaleString("bs-BA", {day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit"}),
      breast: selectedBreast
    };
    saveActive();
    paintFeedModal();
    updateAll();
  });

  document.getElementById("feedStop").addEventListener("click", ()=>{
    if(!activeFeeding) return;

    const endMs = Date.now();
    const endDate = new Date(endMs);
    const durationMin = Math.round((endMs - activeFeeding.startMs)/60000);

    const act = normalizeActivity({
      id: uid(),
      type: "feeding",
      time: activeFeeding.startIso,
      endTime: endDate.toISOString(),
      breast: activeFeeding.breast,
      duration: durationMin,
      notes: document.getElementById("feedNotes").value || "",
      startTimeDisplay: activeFeeding.startDisplay,
      endTimeDisplay: endDate.toLocaleString("bs-BA", {day:"2-digit", month:"2-digit", year:"numeric", hour:"2-digit", minute:"2-digit"}),
      timestamp: Date.now()
    });

    activities.push(act);
    activeFeeding = null;
    saveActs();
    saveActive();
    closeModal("feedModal");
    updateAll();
  });

  // ===== List delete =====
  document.addEventListener("click", (e)=>{
    const del = e.target.closest("[data-del]");
    if(!del) return;
    const id = del.dataset.del;
    if(!confirm("Obrisati zapis?")) return;
    activities = activities.filter(a=>a && a.id !== id);
    saveActs();
    updateAll();
  });

  // ===== Navigation =====
  function setActiveNav(which){
    document.querySelectorAll(".navItem").forEach(x=>x.classList.remove("active"));
    document.getElementById(which).classList.add("active");
  }
  document.getElementById("navHome").addEventListener("click", ()=>{
    isHistory = false; setActiveNav("navHome"); updateAll(); window.scrollTo({top:0, behavior:"instant"});
  });
  document.getElementById("navHistory").addEventListener("click", ()=>{
    isHistory = true; setActiveNav("navHistory"); updateAll(); window.scrollTo({top:0, behavior:"instant"});
  });
  document.getElementById("navSleep").addEventListener("click", ()=> openModal("sleepModal"));
  document.getElementById("navFeed").addEventListener("click", ()=> openModal("feedModal"));
  document.getElementById("toggleHistory").addEventListener("click", ()=>{
    isHistory = !isHistory;
    setActiveNav(isHistory ? "navHistory" : "navHome");
    updateAll();
    window.scrollTo({top:0, behavior:"instant"});
  });

  document.getElementById("openSleep").addEventListener("click", ()=> openModal("sleepModal"));
  document.getElementById("openFeed").addEventListener("click", ()=> openModal("feedModal"));

  // Buttons (placeholder)
  document.getElementById("btnSettings").addEventListener("click", ()=>{
    alert("Opcije: mogu dodati teme, backup/import, i prikaz svih tipova aktivnosti.");
  });
  document.getElementById("btnExport").addEventListener("click", ()=>{
    const blob = new Blob([JSON.stringify({babyActivities: activities, activeSleep, activeFeeding}, null, 2)], {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "nori_backup.json";
    a.click();
    setTimeout(()=> URL.revokeObjectURL(a.href), 4000);
  });

  // Live tick
  function tick(){
    // refresh from storage (multi-tab safe)
    activities = safeParse(localStorage.getItem(KEY_ACTS) || "[]", []);
    activeSleep = safeParse(localStorage.getItem(KEY_ACTIVE_SLEEP) || "null", null);
    activeFeeding = safeParse(localStorage.getItem(KEY_ACTIVE_FEED) || "null", null);
    normalizeAll();

    updatePills();
    updateHero();

    // tick modal timers
    if(document.getElementById("sleepModal").classList.contains("active") && activeSleep){
      const el = Date.now() - activeSleep.startMs;
      document.getElementById("sleepElapsed").textContent = hmsFromMs(el);
      document.getElementById("sleepMeta").textContent = `Počeo: ${formatStamp(activeSleep.startMs)} • ${timeAgo(activeSleep.startMs)}`;
      document.getElementById("sleepTimer").style.display = "block";
    }
    if(document.getElementById("feedModal").classList.contains("active") && activeFeeding){
      const el = Date.now() - activeFeeding.startMs;
      const b = activeFeeding.breast==="left" ? "Lijeva" : activeFeeding.breast==="right" ? "Desna" : activeFeeding.breast==="both" ? "Obje" : "—";
      document.getElementById("feedElapsed").textContent = hmsFromMs(el);
      document.getElementById("feedMeta").textContent = `Počelo: ${formatStamp(activeFeeding.startMs)} • Dojka: ${b}`;
      document.getElementById("feedTimer").style.display = "block";
    }

    // pulse only when active tracking
    document.getElementById("pulseDot").style.display = (activeSleep || activeFeeding) ? "block" : "none";
  }

  updateAll();
  setInterval(tick, 1000);
</script>
</body>
</html>
