<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nori — San & Hranjenje</title>

  <style>
    :root{
      --bg: rgba(252,252,249,1);
      --surface: rgba(255,255,255,0.78);
      --surface2: rgba(255,255,255,0.92);
      --text: rgba(20,22,22,1);
      --muted: rgba(92,102,107,1);
      --border: rgba(94,82,64,0.16);

      --teal: rgba(33,128,141,1);
      --pink: rgba(219,39,119,1);
      --purple: rgba(168,85,247,1);
      --orange: rgba(249,115,22,1);
      --green: rgba(34,197,94,1);

      /* Warm “vintage” accents for analog clock */
      --brass1: #d2a55b;
      --brass2: #8a5c1c;
      --wood1: rgba(126,86,42,0.26);
      --wood2: rgba(72,48,22,0.22);

      --r12: 14px;
      --r16: 16px;
      --r20: 20px;
      --rfull: 9999px;

      --sh1: 0 12px 32px rgba(0,0,0,0.07);
      --sh2: 0 2px 10px rgba(0,0,0,0.06);
      --ring: 0 0 0 3px rgba(33,128,141,0.18);

      --safeT: env(safe-area-inset-top, 0px);
      --safeB: env(safe-area-inset-bottom, 0px);

      --tapMin: 48px;

      /* Layout: keep screen filled on tall S22 Ultra */
      --maxW: 560px;
    }

    @media (prefers-color-scheme: dark){
      :root{
        --bg: rgba(20,22,22,1);
        --surface: rgba(34,36,36,0.78);
        --surface2: rgba(34,36,36,0.92);
        --text: rgba(245,245,245,1);
        --muted: rgba(170,173,173,0.80);
        --border: rgba(170,173,173,0.20);

        --sh1: 0 14px 38px rgba(0,0,0,0.38);
        --sh2: 0 2px 10px rgba(0,0,0,0.32);
        --ring: 0 0 0 3px rgba(74,222,128,0.14);

        --wood1: rgba(126,86,42,0.18);
        --wood2: rgba(72,48,22,0.18);
      }
    }

    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; }
    body{
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 820px at 10% -10%, rgba(33,128,141,0.20), transparent 55%),
        radial-gradient(980px 720px at 98% 5%, rgba(168,85,247,0.18), transparent 55%),
        radial-gradient(900px 650px at 52% 112%, rgba(219,39,119,0.14), transparent 55%),
        var(--bg);
      overflow-x:hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* Softer watermark so readability is better */
    body::before{
      content:"NORI";
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      font-weight: 1000;
      letter-spacing: 0.28em;
      font-size: min(17vw, 132px);
      color: rgba(33,128,141,0.045);
      text-shadow: 0 10px 26px rgba(0,0,0,0.05);
      pointer-events:none;
      z-index:0;
      transform: translateY(-6px);
      user-select:none;
    }
    @media (prefers-color-scheme: dark){
      body::before{ color: rgba(74,222,128,0.04); text-shadow: 0 10px 24px rgba(0,0,0,0.35); }
    }

    /* Full-height layout to avoid “empty” area on tall phone */
    .app{
      position:relative;
      z-index:1;
      max-width: var(--maxW);
      margin: 0 auto;
      padding: 0 14px;
      min-height: 100vh;
      display:flex;
      flex-direction:column;
      padding-bottom: calc(var(--safeB) + 18px);
    }

    .header{
      position: sticky; top:0; z-index:120;
      padding: calc(12px + var(--safeT)) 14px 12px;
      margin: 0 -14px;
      background: linear-gradient(180deg, var(--surface2), var(--surface));
      border-bottom: 1px solid var(--border);
      box-shadow: var(--sh2);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .header-top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
    }
    .brand{
      display:flex; flex-direction:column; gap:6px;
      min-width:0;
    }
    .brand h1{
      font-size: 22px;
      font-weight: 1000;
      letter-spacing:-0.02em;
      line-height:1.1;
      color: var(--teal);
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .sub{
      font-size: 12px;
      color: var(--muted);
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding: 6px 10px;
      border-radius: var(--rfull);
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      max-width:100%;
      white-space:nowrap;
    }
    @media (prefers-color-scheme: dark){
      .pill{ background: rgba(255,255,255,0.06); }
    }

    .icon-btn{
      width: var(--tapMin);
      height: var(--tapMin);
      border-radius: var(--r12);
      border:1px solid var(--border);
      background: rgba(255,255,255,0.20);
      display:flex; align-items:center; justify-content:center;
      box-shadow: var(--sh2);
      cursor:pointer;
      user-select:none;
      flex-shrink:0;
    }
    @media (prefers-color-scheme: dark){
      .icon-btn{ background: rgba(255,255,255,0.06); }
    }
    .icon-btn:active{ transform: scale(0.98); box-shadow:none; }
    .icon-btn span{ font-size: 18px; }

    /* Hero: makes screen feel full + pro */
    .hero{
      margin-top: 12px;
      border-radius: 22px;
      border: 1px solid var(--border);
      box-shadow: var(--sh1);
      overflow:hidden;
      background:
        radial-gradient(950px 460px at 10% 0%, rgba(168,85,247,0.14), transparent 62%),
        radial-gradient(950px 460px at 90% 0%, rgba(219,39,119,0.12), transparent 62%),
        linear-gradient(180deg, rgba(255,255,255,0.92), rgba(255,255,255,0.72));
    }
    @media (prefers-color-scheme: dark){
      .hero{
        background:
          radial-gradient(950px 460px at 10% 0%, rgba(168,85,247,0.14), transparent 62%),
          radial-gradient(950px 460px at 90% 0%, rgba(219,39,119,0.12), transparent 62%),
          linear-gradient(180deg, rgba(34,36,36,0.94), rgba(34,36,36,0.72));
      }
    }
    .hero-inner{ padding: 16px; }
    .hero-top{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom: 10px; }
    .hero-title{ font-size: 13px; font-weight: 1000; color: var(--muted); letter-spacing:-0.01em; }
    .hero-chip{
      font-size: 12px; font-weight: 1000;
      padding: 6px 10px;
      border-radius: 999px;
      border:1px solid var(--border);
      background: rgba(33,128,141,0.10);
      color: var(--teal);
      white-space:nowrap;
    }
    .hero-main{
      font-size: 30px;
      font-weight: 1000;
      letter-spacing:-0.03em;
      line-height:1.08;
      margin-bottom: 8px;
      font-variant-numeric: tabular-nums;
    }
    .hero-sub{
      font-size: 13px;
      color: var(--muted);
      line-height: 1.35;
    }

    .hero-actions{
      margin-top: 14px;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .hero-btn{
      min-height: 56px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.18);
      cursor:pointer;
      user-select:none;
      font-weight: 1000;
      font-size: 15px;
      display:flex; align-items:center; justify-content:center;
      gap:10px;
    }
    @media (prefers-color-scheme: dark){
      .hero-btn{ background: rgba(255,255,255,0.06); }
    }
    .hero-btn:active{ transform: scale(0.985); }
    .hero-btn.sleep{ box-shadow: 0 14px 30px rgba(168,85,247,0.10); }
    .hero-btn.feed{ box-shadow: 0 14px 30px rgba(219,39,119,0.10); }

    /* Content section fills remaining height */
    .content{
      margin-top: 12px;
      flex: 1;
      display:flex;
      flex-direction:column;
      min-height: 0; /* allow inner scroll */
    }

    .section{
      border-radius: 22px;
      border: 1px solid var(--border);
      box-shadow: var(--sh1);
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.72));
      overflow:hidden;
      flex:1;
      min-height: 0;
      display:flex;
      flex-direction:column;
    }
    @media (prefers-color-scheme: dark){
      .section{ background: linear-gradient(180deg, rgba(34,36,36,0.92), rgba(34,36,36,0.72)); }
    }
    .section-head{
      padding: 14px 14px 10px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      border-bottom: 1px solid rgba(255,255,255,0.0);
    }
    .section-title{ font-size: 16px; font-weight: 1000; letter-spacing:-0.01em; }
    .link{
      font-size: 13px;
      color: var(--teal);
      font-weight: 1000;
      cursor:pointer;
      user-select:none;
      text-decoration:none;
      white-space:nowrap;
    }

    .list{
      padding: 10px 14px 14px;
      display:flex;
      flex-direction:column;
      gap: 10px;
      overflow:auto;
      -webkit-overflow-scrolling: touch;
      min-height: 0;
    }

    .item{
      display:flex;
      gap: 12px;
      padding: 12px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.22);
      align-items:flex-start;
      overflow:hidden;
    }
    @media (prefers-color-scheme: dark){
      .item{ background: rgba(255,255,255,0.06); }
    }

    .i-ico{
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-shrink:0;
      border: 1px solid rgba(255,255,255,0.14);
    }
    .i-ico span{ font-size: 22px; }

    .i-content{ flex:1; min-width:0; }
    .i-title{
      font-weight: 1000;
      font-size: 13px;
      line-height: 1.15;
      margin-bottom: 3px;
    }
    .i-details{
      font-size: 12px;
      color: var(--muted);
      line-height: 1.35;
      overflow-wrap:anywhere;
    }
    .i-time{
      font-size: 11px;
      color: var(--muted);
      white-space:nowrap;
      flex-shrink:0;
      margin-left: 6px;
    }

    .actions{
      display:flex;
      gap: 8px;
      flex-wrap:wrap;
      margin-top: 8px;
    }
    .small-btn{
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.16);
      color: var(--text);
      font-weight: 1000;
      font-size: 12px;
      cursor:pointer;
      user-select:none;
    }
    @media (prefers-color-scheme: dark){
      .small-btn{ background: rgba(255,255,255,0.06); }
    }
    .small-btn:active{ transform: scale(0.98); }
    .danger{
      border-color: rgba(249,115,22,0.35);
      background: rgba(249,115,22,0.10);
      color: var(--orange);
    }

    .empty{
      text-align:center;
      padding: 18px 10px;
      color: var(--muted);
      font-size: 13px;
    }

    /* History view (same container, just switches content) */
    .day-group{
      border:1px solid var(--border);
      border-radius: 18px;
      overflow:hidden;
      background: rgba(255,255,255,0.16);
    }
    @media (prefers-color-scheme: dark){
      .day-group{ background: rgba(255,255,255,0.05); }
    }
    .day-head{
      padding: 10px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      background: linear-gradient(180deg, rgba(33,128,141,0.10), rgba(33,128,141,0.03));
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: calc(68px + var(--safeT));
      z-index: 10;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .day-title{ font-weight: 1000; font-size: 13px; }
    .day-meta{ font-size: 11px; color: var(--muted); white-space:nowrap; }
    .day-body{ padding: 10px; display:flex; flex-direction:column; gap:10px; }

    /* Modal base */
    .modal{
      display:none;
      position: fixed;
      inset:0;
      background: rgba(0,0,0,0.58);
      z-index: 1000;
      padding-bottom: var(--safeB);
      animation: fadeIn .18s ease-out;
    }
    .modal.active{ display:flex; align-items:flex-end; }
    @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
    @keyframes slideUp{ from{ transform: translateY(100%);} to{ transform: translateY(0);} }

    .sheet{
      width: 100%;
      max-height: 90vh;
      border-radius: 24px 24px 0 0;
      padding: 18px 16px calc(18px + var(--safeB));
      background: linear-gradient(180deg, var(--surface2), var(--surface));
      border-top: 1px solid var(--border);
      box-shadow: 0 -24px 56px rgba(0,0,0,0.25);
      overflow-y:auto;
      animation: slideUp .25s ease-out;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .m-head{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom: 12px; }
    .m-title{ font-size: 18px; font-weight: 1000; letter-spacing:-0.01em; }
    .close{ font-size: 28px; color: var(--muted); cursor:pointer; user-select:none; line-height:1; }

    /* Vintage analog clock inside timer box */
    .timer-box{
      padding: 16px 14px;
      border-radius: 20px;
      border:1px solid var(--border);
      background:
        radial-gradient(540px 220px at 30% 0%, rgba(210,165,91,0.12), transparent 60%),
        radial-gradient(560px 240px at 70% 0%, rgba(138,92,28,0.10), transparent 60%),
        rgba(255,255,255,0.16);
      margin-bottom: 14px;
      overflow:hidden;
    }
    @media (prefers-color-scheme: dark){
      .timer-box{ background:
        radial-gradient(540px 220px at 30% 0%, rgba(210,165,91,0.10), transparent 60%),
        radial-gradient(560px 240px at 70% 0%, rgba(138,92,28,0.09), transparent 60%),
        rgba(255,255,255,0.06); }
    }

    .timer-row{
      display:flex;
      gap: 14px;
      align-items:center;
      justify-content:space-between;
    }

    .analog{
      width: 104px;
      height: 104px;
      border-radius: 999px;
      position:relative;
      flex-shrink:0;

      /* Brass bezel + inner paper + subtle wood */
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.30), rgba(255,255,255,0.00) 55%),
        radial-gradient(circle at 30% 20%, rgba(210,165,91,0.30), transparent 52%),
        linear-gradient(180deg, var(--wood1), var(--wood2));
      border: 1px solid rgba(138,92,28,0.35);
      box-shadow:
        inset 0 0 0 2px rgba(255,255,255,0.06),
        inset 0 0 0 7px rgba(210,165,91,0.14),
        0 18px 36px rgba(0,0,0,0.12);
    }
    @media (prefers-color-scheme: dark){
      .analog{
        border: 1px solid rgba(210,165,91,0.22);
        box-shadow:
          inset 0 0 0 2px rgba(255,255,255,0.04),
          inset 0 0 0 7px rgba(210,165,91,0.10),
          0 18px 38px rgba(0,0,0,0.45);
      }
    }

    /* Inner dial */
    .dial{
      position:absolute;
      inset: 10px;
      border-radius: 999px;
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,0.92), rgba(255,255,255,0.78) 55%, rgba(255,255,255,0.62) 100%),
        radial-gradient(circle at 40% 20%, rgba(210,165,91,0.12), transparent 55%);
      border: 1px solid rgba(94,82,64,0.18);
      overflow:hidden;
    }
    @media (prefers-color-scheme: dark){
      .dial{
        background:
          radial-gradient(circle at 50% 42%, rgba(255,255,255,0.12), rgba(255,255,255,0.06) 55%, rgba(255,255,255,0.04) 100%),
          radial-gradient(circle at 40% 20%, rgba(210,165,91,0.10), transparent 55%);
        border: 1px solid rgba(170,173,173,0.18);
      }
    }

    /* Glass / shine */
    .glass{
      position:absolute;
      inset: 0;
      border-radius: 999px;
      background:
        radial-gradient(140px 90px at 28% 20%, rgba(255,255,255,0.55), transparent 60%),
        linear-gradient(135deg, rgba(255,255,255,0.18), transparent 35%, rgba(255,255,255,0.06));
      mix-blend-mode: screen;
      pointer-events:none;
    }
    @media (prefers-color-scheme: dark){
      .glass{
        background:
          radial-gradient(140px 90px at 28% 20%, rgba(255,255,255,0.18), transparent 60%),
          linear-gradient(135deg, rgba(255,255,255,0.08), transparent 35%, rgba(255,255,255,0.03));
      }
    }

    .roman{
      position:absolute;
      inset: 14px;
      border-radius: 999px;
      pointer-events:none;
      display:flex;
      align-items:center;
      justify-content:center;
      color: rgba(20,22,22,0.72);
      font-weight: 1000;
      font-size: 10px;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 0 rgba(255,255,255,0.35);
    }
    @media (prefers-color-scheme: dark){
      .roman{ color: rgba(245,245,245,0.62); text-shadow: none; }
    }
    .roman span{
      position:absolute;
      transform-origin: 50% 38px;
      top: 50%;
      left: 50%;
      transform: translate(-50%,-50%) rotate(var(--rot)) translateY(-38px) rotate(calc(var(--rot) * -1));
    }

    .ticks{
      position:absolute;
      inset: 16px;
      border-radius: 999px;
      pointer-events:none;
      background:
        conic-gradient(from -90deg,
          rgba(0,0,0,0.28) 0deg 1deg, transparent 1deg 6deg,
          rgba(0,0,0,0.22) 6deg 7deg, transparent 7deg 12deg,
          rgba(0,0,0,0.22) 12deg 13deg, transparent 13deg 18deg,
          rgba(0,0,0,0.22) 18deg 19deg, transparent 19deg 24deg,
          rgba(0,0,0,0.28) 24deg 25deg, transparent 25deg 30deg
        );
      opacity: 0.35;
      mask: radial-gradient(circle at 50% 50%, transparent 0 64%, #000 66% 100%);
      -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 64%, #000 66% 100%);
    }
    @media (prefers-color-scheme: dark){
      .ticks{ opacity: 0.26; }
    }

    .hand{
      position:absolute;
      left:50%; top:50%;
      transform-origin: 50% 100%;
      transform: translate(-50%,-100%) rotate(0deg);
      border-radius: 999px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.20));
    }
    .hand.sec{
      width: 2px;
      height: 42px;
      background: linear-gradient(180deg, rgba(249,115,22,1), rgba(138,92,28,0.85));
    }
    .hand.min{
      width: 3px;
      height: 34px;
      background: linear-gradient(180deg, rgba(33,128,141,1), rgba(20,22,22,0.75));
      opacity: 0.95;
    }
    .hand.hour{
      width: 4px;
      height: 26px;
      background: linear-gradient(180deg, rgba(20,22,22,0.95), rgba(20,22,22,0.55));
      opacity: 0.90;
    }
    @media (prefers-color-scheme: dark){
      .hand.hour{
        background: linear-gradient(180deg, rgba(245,245,245,0.85), rgba(245,245,245,0.45));
      }
      .hand.min{
        background: linear-gradient(180deg, rgba(74,222,128,0.85), rgba(245,245,245,0.25));
      }
    }

    .pin{
      position:absolute;
      left:50%; top:50%;
      width: 10px; height: 10px;
      transform: translate(-50%,-50%);
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.7), rgba(255,255,255,0.0) 55%), var(--brass1);
      border: 1px solid rgba(138,92,28,0.38);
      box-shadow: 0 2px 8px rgba(0,0,0,0.22);
    }

    .timer-digital{
      flex: 1;
      min-width:0;
      display:flex;
      flex-direction:column;
      gap:6px;
      align-items:flex-end;
    }
    .t-big{
      font-size: 38px;
      font-weight: 1000;
      letter-spacing:-0.02em;
      font-variant-numeric: tabular-nums;
      color: var(--teal);
      white-space:nowrap;
    }
    .t-sub{
      font-size: 12px;
      color: var(--muted);
      text-align:right;
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
    }

    .primary{
      width:100%;
      min-height: calc(var(--tapMin) + 8px);
      padding: 14px;
      border-radius: 18px;
      border:none;
      cursor:pointer;
      user-select:none;
      font-size: 15px;
      font-weight: 1000;
      color:#fff;
      background: rgba(33,128,141,1);
      box-shadow: 0 14px 30px rgba(33,128,141,0.18);
      transition: all .18s ease;
    }
    .primary:active{ transform: scale(0.985); filter: brightness(0.96); box-shadow:none; }
    .primary.purple{ background: var(--purple); box-shadow: 0 14px 30px rgba(168,85,247,0.18); }
    .primary.pink{ background: var(--pink); box-shadow: 0 14px 30px rgba(219,39,119,0.18); }
    .primary.green{ background: var(--green); box-shadow: 0 14px 30px rgba(34,197,94,0.18); }
    .primary.orange{ background: var(--orange); box-shadow: 0 14px 30px rgba(249,115,22,0.18); }

    /* Advanced inputs (hidden by default) */
    .advanced{
      margin-top: 12px;
      border:1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      background: rgba(255,255,255,0.14);
    }
    @media (prefers-color-scheme: dark){
      .advanced{ background: rgba(255,255,255,0.05); }
    }

    .row2{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .form-group{ margin-bottom: 10px; }
    .label{ display:block; font-size: 13px; font-weight: 1000; margin-bottom: 7px; }
    .input, .textarea{
      width:100%;
      min-height: var(--tapMin);
      padding: 12px 12px;
      border-radius: 14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.16);
      color: var(--text);
      font-size: 15px;
      outline:none;
    }
    @media (prefers-color-scheme: dark){
      .input, .textarea{ background: rgba(255,255,255,0.06); }
    }
    .input:focus, .textarea:focus{
      box-shadow: var(--ring);
      border-color: rgba(33,128,141,0.45);
    }
    .textarea{ min-height: 86px; resize: vertical; font-family: inherit; }

    .btns{ display:flex; gap:10px; flex-wrap:wrap; margin: 10px 0 12px; }
    .toggle{
      flex: 1 1 120px;
      min-width: 120px;
      min-height: var(--tapMin);
      padding: 12px;
      border-radius: 14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.14);
      color: var(--text);
      font-weight: 1000;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
      transition: all .16s ease;
    }
    @media (prefers-color-scheme: dark){
      .toggle{ background: rgba(255,255,255,0.06); }
    }
    .toggle.active{
      background: rgba(33,128,141,0.95);
      color:#fff;
      border-color: rgba(33,128,141,0.95);
      box-shadow: 0 10px 20px rgba(33,128,141,0.18);
    }

    .ghost{
      width:100%;
      min-height: var(--tapMin);
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.10);
      color: var(--text);
      font-weight: 1000;
      cursor:pointer;
      user-select:none;
    }
    @media (prefers-color-scheme: dark){
      .ghost{ background: rgba(255,255,255,0.05); }
    }
    .ghost:active{ transform: scale(0.985); }

    @media (max-width: 360px){
      .hero-main{ font-size: 28px; }
      .t-big{ font-size: 34px; }
      .hero-actions{ grid-template-columns: 1fr; }
      .row2{ grid-template-columns: 1fr; }
    }
  </style>
</head>

  <!-- Feeding modal -->

  <!-- Edit modal -->

<script>
  // Storage keys (local-only). Original concept: activities + active objects. [file:1]
  const KEY_ACTS = "babyActivities_v3_sleep_feed";
  const KEY_ACTIVE_SLEEP = "activeSleep_v3";
  const KEY_ACTIVE_FEED = "activeFeeding_v3";

  let activities = JSON.parse(localStorage.getItem(KEY_ACTS) || "[]");
  let activeSleep = JSON.parse(localStorage.getItem(KEY_ACTIVE_SLEEP) || "null");
  let activeFeeding = JSON.parse(localStorage.getItem(KEY_ACTIVE_FEED) || "null");

  let homeInterval = null;

  // feeding selections
  let selectedBreast = null;

  // edit state
  let editId = null;
  let editBreast = null;

  // ---- Helpers ----
  function pad2(n){ return String(n).padStart(2,"0"); }
  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }
  function uid(){
    return "a_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16);
  }

  function parseClockToHMS(clock){
    const m = /^(\d{1,2}):(\d{2})(?::(\d{2}))?$/.exec((clock||"").trim());
    if(!m) return null;
    const hh = Number(m[1]), mm = Number(m[2]), ss = Number(m[3] ?? "00");
    if(hh<0||hh>23||mm<0||mm>59||ss<0||ss>59) return null;
    return {hh,mm,ss};
  }
  function dateClockToMs(dateStr, clockStr){
    if(!dateStr) return null;
    const hms = parseClockToHMS(clockStr);
    if(!hms) return null;
    const d = new Date(`${dateStr}T${pad2(hms.hh)}:${pad2(hms.mm)}:${pad2(hms.ss)}`);
    if(Number.isNaN(d.getTime())) return null;
    return d.getTime();
  }
  function msToISO(ms){ return new Date(ms).toISOString(); }
  function msToDate(ms){
    const d = new Date(ms);
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }
  function msToClock(ms){
    const d = new Date(ms);
    return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  }
  function hmsFromMs(ms){
    const total = Math.max(0, Math.floor(ms/1000));
    const h = Math.floor(total/3600);
    const m = Math.floor((total%3600)/60);
    const s = total%60;
    return `${pad2(h)}:${pad2(m)}:${pad2(s)}`;
  }
  function formatStamp(ms){
    const d = new Date(ms);
    return `${pad2(d.getDate())}.${pad2(d.getMonth()+1)}.${d.getFullYear()} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  }
  function timeAgoSeconds(ms){
    const diff = Date.now() - ms;
    const sec = Math.floor(diff/1000);
    if(sec < 0) return "u budućnosti";
    if(sec < 5) return "upravo";
    if(sec < 60) return `prije ${sec}s`;
    const min = Math.floor(sec/60);
    if(min < 60) return `prije ${min}m ${sec%60}s`;
    const hr = Math.floor(min/60);
    if(hr < 24) return `prije ${hr}h ${min%60}m ${sec%60}s`;
    const days = Math.floor(hr/24);
    return `prije ${days}d ${hr%24}h ${min%60}m`;
  }
  function dayKey(ms){
    const d = new Date(ms);
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }
  function dayLabel(key){
    const [y,m,d] = key.split("-").map(Number);
    const dt = new Date(`${y}-${pad2(m)}-${pad2(d)}T00:00:00`);
    const today = new Date(); today.setHours(0,0,0,0);
    const yest = new Date(today); yest.setDate(yest.getDate()-1);
    if(dt.getTime() === today.getTime()) return "Danas";
    if(dt.getTime() === yest.getTime()) return "Jučer";
    return `${pad2(d)}.${pad2(m)}.${y}`;
  }

  function saveActs(){ localStorage.setItem(KEY_ACTS, JSON.stringify(activities)); }
  function saveActive(){
    if(activeSleep) localStorage.setItem(KEY_ACTIVE_SLEEP, JSON.stringify(activeSleep));
    else localStorage.removeItem(KEY_ACTIVE_SLEEP);
    if(activeFeeding) localStorage.setItem(KEY_ACTIVE_FEED, JSON.stringify(activeFeeding));
    else localStorage.removeItem(KEY_ACTIVE_FEED);
  }

  function iconFor(type){
    if(type==="sleep") return {emoji:"😴", bg:"rgba(192,132,252,0.18)", color:"rgba(168,85,247,1)"};
    return {emoji:"🍼", bg:"rgba(236,72,153,0.16)", color:"rgba(219,39,119,1)"};
  }
  function titleFor(a){
    if(a.type==="sleep") return "San";
    const b = a.breast==="left" ? "Lijeva" : a.breast==="right" ? "Desna" : "Obje";
    return `Hranjenje — ${b}`;
  }
  function detailsFor(a){
    const start = formatStamp(a.startMs);
    const end = formatStamp(a.endMs);
    const dur = hmsFromMs(a.endMs - a.startMs);
    if(a.type==="sleep"){
      const awake = timeAgoSeconds(a.endMs);
      const notes = a.notes ? ` • ${escapeHtml(a.notes)}` : "";
      return `Start: ${start} • Kraj: ${end} • Trajanje: ${dur} • Budan: ${awake}${notes}`;
    }else{
      const since = timeAgoSeconds(a.startMs);
      const notes = a.notes ? ` • ${escapeHtml(a.notes)}` : "";
      return `Start: ${start} • Kraj: ${end} • Trajanje: ${dur} • Počelo: ${since}${notes}`;
    }
  }

  function itemHTML(a){
    const ic = iconFor(a.type);
    return `
      <div class="item">
        <div class="i-ico" style="background:${ic.bg}; color:${ic.color};"><span>${ic.emoji}</span></div>
        <div class="i-content">
          <div class="i-title">${escapeHtml(titleFor(a))}</div>
          <div class="i-details">${detailsFor(a)}</div>
          <div class="actions">
            <button class="small-btn" data-edit="${a.id}">Uredi</button>
            <button class="small-btn danger" data-del="${a.id}">Obriši</button>
          </div>
        </div>
        <div class="i-time">${timeAgoSeconds(a.startMs)}</div>
      </div>
    `;
  }

  function activeCardHTML(type){
    if(type==="sleep" && activeSleep){
      const ic = iconFor("sleep");
      const elapsed = Date.now() - activeSleep.startMs;
      return `
        <div class="item">
          <div class="i-ico" style="background:${ic.bg}; color:${ic.color};"><span>${ic.emoji}</span></div>
          <div class="i-content">
            <div class="i-title">San aktivan</div>
            <div class="i-details">Počeo: ${formatStamp(activeSleep.startMs)} • Traje: ${hmsFromMs(elapsed)}</div>
          </div>
          <div class="i-time">sada</div>
        </div>
      `;
    }
    if(type==="feeding" && activeFeeding){
      const ic = iconFor("feeding");
      const elapsed = Date.now() - activeFeeding.startMs;
      const b = activeFeeding.breast==="left" ? "Lijeva" : activeFeeding.breast==="right" ? "Desna" : "Obje";
      return `
        <div class="item">
          <div class="i-ico" style="background:${ic.bg}; color:${ic.color};"><span>${ic.emoji}</span></div>
          <div class="i-content">
            <div class="i-title">Hranjenje aktivno — ${b}</div>
            <div class="i-details">Počelo: ${formatStamp(activeFeeding.startMs)} • Traje: ${hmsFromMs(elapsed)}</div>
          </div>
          <div class="i-time">sada</div>
        </div>
      `;
    }
    return "";
  }

  // ---- Vintage roman numerals (I, II, III ...) ----
  function buildRoman(elId){
    const el = document.getElementById(elId);
    if(!el || el.dataset.built === "1") return;
    el.dataset.built = "1";
    const romans = ["XII","I","II","III","IV","V","VI","VII","VIII","IX","X","XI"];
    // Each at 30deg increments starting at top (0deg)
    el.innerHTML = romans.map((r, i)=>{
      const deg = i * 30;
      return `<span style="--rot:${deg}deg">${r}</span>`;
    }).join("");
  }

  // ---- Analog movement ----
  function setAnalog(elH, elM, elS, elapsedMs){
    const totalSec = Math.floor(Math.max(0, elapsedMs)/1000);
    const sec = totalSec % 60;
    const min = Math.floor(totalSec/60) % 60;
    const hr = Math.floor(totalSec/3600) % 12;

    const sDeg = sec * 6;
    const mDeg = min * 6 + sec * 0.1;
    const hDeg = hr * 30 + min * 0.5;

    elS.style.transform = `translate(-50%,-100%) rotate(${sDeg}deg)`;
    elM.style.transform = `translate(-50%,-100%) rotate(${mDeg}deg)`;
    elH.style.transform = `translate(-50%,-100%) rotate(${hDeg}deg)`;
  }

  function updateHeaderPills(){
    const lastSleep = activities.filter(a=>a.type==="sleep").sort((a,b)=>b.endMs-a.endMs)[0];
    const lastFeed  = activities.filter(a=>a.type==="feeding").sort((a,b)=>b.endMs-a.endMs)[0];
    document.getElementById("pillSleepAgo").textContent = lastSleep ? timeAgoSeconds(lastSleep.endMs) : "-";
    document.getElementById("pillFeedAgo").textContent  = lastFeed  ? timeAgoSeconds(lastFeed.endMs)  : "-";
  }

  function updateHero(){
    const main = document.getElementById("heroMain");
    const sub  = document.getElementById("heroSub");

    if(activeSleep){
      main.textContent = `Spava • ${hmsFromMs(Date.now() - activeSleep.startMs)}`;
      sub.textContent  = `Počeo: ${formatStamp(activeSleep.startMs)} (${timeAgoSeconds(activeSleep.startMs)})`;
      return;
    }
    if(activeFeeding){
      const b = activeFeeding.breast==="left" ? "Lijeva" : activeFeeding.breast==="right" ? "Desna" : "Obje";
      main.textContent = `Jede (${b}) • ${hmsFromMs(Date.now() - activeFeeding.startMs)}`;
      sub.textContent  = `Počelo: ${formatStamp(activeFeeding.startMs)} • Dojka: ${b}`;
      return;
    }

    const lastSleep = activities.filter(a=>a.type==="sleep").sort((a,b)=>b.endMs-a.endMs)[0];
    const lastFeed  = activities.filter(a=>a.type==="feeding").sort((a,b)=>b.endMs-a.endMs)[0];

    const awakeFrom = lastSleep ? timeAgoSeconds(lastSleep.endMs) : "-";
    const feedAgo   = lastFeed  ? timeAgoSeconds(lastFeed.endMs)  : "-";
    main.textContent = `Budan • ${awakeFrom}`;
    sub.textContent  = `Zadnje hranjenje: ${feedAgo}`;
  }

  let isHistory = false;

  function updateMainList(){
    const list = document.getElementById("mainList");
    const title = document.getElementById("sectionTitle");
    const link  = document.getElementById("toggleView");

    if(!isHistory){
      title.textContent = "Trenutno / posljednje";
      link.textContent = "Historija";

      const blocks = [];
      if(activeSleep) blocks.push(activeCardHTML("sleep"));
      if(activeFeeding) blocks.push(activeCardHTML("feeding"));

      const lastSleep = activities.filter(a=>a.type==="sleep").sort((a,b)=>b.endMs-a.endMs)[0];
      const lastFeed  = activities.filter(a=>a.type==="feeding").sort((a,b)=>b.endMs-a.endMs)[0];

      if(!activeSleep && lastSleep) blocks.push(itemHTML(lastSleep));
      if(!activeFeeding && lastFeed) blocks.push(itemHTML(lastFeed));

      list.innerHTML = blocks.length ? blocks.join("") : `<div class="empty">Nema aktivnosti.</div>`;
      return;
    }

    title.textContent = "Historija (po danima)";
    link.textContent = "Početna";

    const sorted = [...activities].sort((a,b)=>b.startMs-a.startMs);
    if(!sorted.length){
      list.innerHTML = `<div class="empty">Nema zapisa.</div>`;
      return;
    }
    const groups = {};
    for(const a of sorted){
      const k = dayKey(a.startMs);
      if(!groups[k]) groups[k] = [];
      groups[k].push(a);
    }
    const keys = Object.keys(groups).sort((a,b)=>a<b?1:-1);

    list.innerHTML = keys.map(k=>{
      const items = groups[k].map(a=>itemHTML(a)).join("");
      return `
        <div class="day-group">
          <div class="day-head">
            <div class="day-title">${dayLabel(k)}</div>
            <div class="day-meta">${groups[k].length} zapisa</div>
          </div>
          <div class="day-body">${items}</div>
        </div>
      `;
    }).join("");
  }

  function updateDisplay(){
    updateHeaderPills();
    updateHero();
    updateMainList();
  }

  // ---- Modals open/close ----
  function openModal(id){
    document.getElementById(id).classList.add("active");
    if(id === "sleepModal") setupSleepModal();
    if(id === "feedModal") setupFeedModal();
    if(id === "editModal") setupEditModal();

    // build roman once
    if(id === "sleepModal") buildRoman("sleepRoman");
    if(id === "feedModal") buildRoman("feedRoman");

    tickActiveTimersInModals();
  }
  function closeModal(id){ document.getElementById(id).classList.remove("active"); }

  document.querySelectorAll(".modal").forEach(m=>{
    m.addEventListener("click", (e)=>{ if(e.target === m) closeModal(m.id); });
  });
  document.querySelectorAll("[data-close]").forEach(x=>{
    x.addEventListener("click", ()=> closeModal(x.dataset.close));
  });

  function ensureIntervals(){
    if(homeInterval) return;
    homeInterval = setInterval(()=>{
      // refresh active state from storage (in case another tab changed)
      activeSleep = JSON.parse(localStorage.getItem(KEY_ACTIVE_SLEEP) || "null");
      activeFeeding = JSON.parse(localStorage.getItem(KEY_ACTIVE_FEED) || "null");

      updateHeaderPills();
      updateHero();
      if(!isHistory) updateMainList(); // lightweight update
      tickActiveTimersInModals();
    }, 1000);
  }

  // ---- Sleep modal setup / flow ----
  function setupSleepModal(){
    const now = Date.now();
    // default values for advanced (if user opens it)
    document.getElementById("sleepStartDate").value = msToDate(now);
    document.getElementById("sleepStartClock").value = msToClock(now);

    // keep advanced hidden by default
    document.getElementById("sleepAdvanced").style.display = "none";
    document.getElementById("sleepAdvancedBtn").textContent = "Uredi vrijeme / bilješke";

    if(activeSleep){
      document.getElementById("sleepTimerBox").style.display = "block";
      document.getElementById("sleepStartBtn").style.display = "none";
      document.getElementById("sleepStopBtn").style.display = "block";
    }else{
      document.getElementById("sleepTimerBox").style.display = "none";
      document.getElementById("sleepStartBtn").style.display = "block";
      document.getElementById("sleepStopBtn").style.display = "none";
      document.getElementById("sleepNotes").value = "";
    }
  }

  document.getElementById("sleepAdvancedBtn").addEventListener("click", ()=>{
    const box = document.getElementById("sleepAdvanced");
    const isOpen = box.style.display === "block";
    box.style.display = isOpen ? "none" : "block";
    document.getElementById("sleepAdvancedBtn").textContent = isOpen ? "Uredi vrijeme / bilješke" : "Sakrij napredno";
  });

  document.getElementById("sleepStartBtn").addEventListener("click", ()=>{
    if(activeSleep) return;

    // If advanced is open and user typed a custom time, use it; else use now.
    const advOpen = document.getElementById("sleepAdvanced").style.display === "block";
    let startMs = Date.now();
    if(advOpen){
      const ms = dateClockToMs(
        document.getElementById("sleepStartDate").value,
        document.getElementById("sleepStartClock").value
      );
      if(ms === null) return alert("Unesi ispravno vrijeme (HH:MM:SS) i datum.");
      if(ms > Date.now() + 1000) return alert("Početak ne može biti u budućnosti.");
      startMs = ms;
    }

    activeSleep = { startMs, startIso: msToISO(startMs) };
    saveActive();
    updateDisplay();
    setupSleepModal();
  });

  document.getElementById("sleepStopBtn").addEventListener("click", ()=>{
    if(!activeSleep) return;
    const endMs = Date.now();
    if(endMs <= activeSleep.startMs) return alert("Greška u vremenima.");

    const notes = document.getElementById("sleepNotes").value || "";
    activities.push({
      id: uid(),
      type: "sleep",
      startMs: activeSleep.startMs,
      endMs,
      startIso: activeSleep.startIso,
      endIso: msToISO(endMs),
      notes,
      createdAt: Date.now()
    });

    activeSleep = null;
    saveActs();
    saveActive();
    updateDisplay();
    closeModal("sleepModal");
  });

  // ---- Feeding modal setup / flow ----
  function clearBreastSelection(containerId){
    document.querySelectorAll(`#${containerId} .toggle`).forEach(b=>b.classList.remove("active"));
  }

  function setupFeedModal(){
    const now = Date.now();
    document.getElementById("feedStartDate").value = msToDate(now);
    document.getElementById("feedStartClock").value = msToClock(now);

    document.getElementById("feedAdvanced").style.display = "none";
    document.getElementById("feedAdvancedBtn").textContent = "Uredi vrijeme / bilješke";

    if(activeFeeding){
      document.getElementById("feedTimerBox").style.display = "block";
      document.getElementById("feedStartBtn").style.display = "none";
      document.getElementById("feedStopBtn").style.display = "block";

      selectedBreast = activeFeeding.breast;
      clearBreastSelection("breastBtns");
      document.querySelectorAll("#breastBtns .toggle").forEach(btn=>{
        if(btn.dataset.breast === selectedBreast) btn.classList.add("active");
      });
    }else{
      document.getElementById("feedTimerBox").style.display = "none";
      document.getElementById("feedStartBtn").style.display = "block";
      document.getElementById("feedStopBtn").style.display = "none";
      selectedBreast = null;
      clearBreastSelection("breastBtns");
      document.getElementById("feedNotes").value = "";
    }
  }

  document.getElementById("feedAdvancedBtn").addEventListener("click", ()=>{
    const box = document.getElementById("feedAdvanced");
    const isOpen = box.style.display === "block";
    box.style.display = isOpen ? "none" : "block";
    document.getElementById("feedAdvancedBtn").textContent = isOpen ? "Uredi vrijeme / bilješke" : "Sakrij napredno";
  });

  document.querySelectorAll("#breastBtns .toggle").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      clearBreastSelection("breastBtns");
      btn.classList.add("active");
      selectedBreast = btn.dataset.breast;
    });
  });

  document.getElementById("feedStartBtn").addEventListener("click", ()=>{
    if(activeFeeding) return;
    if(!selectedBreast) return alert("Odaberi dojku (Lijeva/Desna/Obje).");

    const advOpen = document.getElementById("feedAdvanced").style.display === "block";
    let startMs = Date.now();
    if(advOpen){
      const ms = dateClockToMs(
        document.getElementById("feedStartDate").value,
        document.getElementById("feedStartClock").value
      );
      if(ms === null) return alert("Unesi ispravno vrijeme (HH:MM:SS) i datum.");
      if(ms > Date.now() + 1000) return alert("Početak ne može biti u budućnosti.");
      startMs = ms;
    }

    activeFeeding = { startMs, startIso: msToISO(startMs), breast: selectedBreast };
    saveActive();
    updateDisplay();
    setupFeedModal();
  });

  document.getElementById("feedStopBtn").addEventListener("click", ()=>{
    if(!activeFeeding) return;
    const endMs = Date.now();
    if(endMs <= activeFeeding.startMs) return alert("Greška u vremenima.");

    const notes = document.getElementById("feedNotes").value || "";
    activities.push({
      id: uid(),
      type: "feeding",
      breast: activeFeeding.breast,
      startMs: activeFeeding.startMs,
      endMs,
      startIso: activeFeeding.startIso,
      endIso: msToISO(endMs),
      notes,
      createdAt: Date.now()
    });

    activeFeeding = null;
    saveActs();
    saveActive();
    updateDisplay();
    closeModal("feedModal");
  });

  // ---- Edit / Delete ----
  function findAct(id){ return activities.find(a=>a.id === id); }

  function setupEditModal(){
    const a = findAct(editId);
    if(!a) return closeModal("editModal");

    document.getElementById("editType").value = a.type === "sleep" ? "San" : "Hranjenje";
    document.getElementById("editStartDate").value = msToDate(a.startMs);
    document.getElementById("editStartClock").value = msToClock(a.startMs);
    document.getElementById("editEndDate").value = msToDate(a.endMs);
    document.getElementById("editEndClock").value = msToClock(a.endMs);
    document.getElementById("editNotes").value = a.notes || "";

    if(a.type === "feeding"){
      document.getElementById("editBreastGroup").style.display = "block";
      editBreast = a.breast;
      clearBreastSelection("editBreastBtns");
      document.querySelectorAll("#editBreastBtns .toggle").forEach(btn=>{
        if(btn.dataset.breast === editBreast) btn.classList.add("active");
      });
    }else{
      document.getElementById("editBreastGroup").style.display = "none";
      editBreast = null;
    }
  }

  document.querySelectorAll("#editBreastBtns .toggle").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      clearBreastSelection("editBreastBtns");
      btn.classList.add("active");
      editBreast = btn.dataset.breast;
    });
  });

  document.getElementById("editSaveBtn").addEventListener("click", ()=>{
    const a = findAct(editId);
    if(!a) return;

    const startMs = dateClockToMs(document.getElementById("editStartDate").value, document.getElementById("editStartClock").value);
    const endMs   = dateClockToMs(document.getElementById("editEndDate").value,   document.getElementById("editEndClock").value);
    if(startMs === null || endMs === null) return alert("Unesi ispravne datume i vremena (HH:MM:SS).");
    if(endMs <= startMs) return alert("Kraj mora biti poslije početka.");

    a.startMs = startMs;
    a.endMs = endMs;
    a.startIso = msToISO(startMs);
    a.endIso = msToISO(endMs);
    a.notes = document.getElementById("editNotes").value || "";

    if(a.type === "feeding"){
      if(!editBreast) return alert("Odaberi dojku.");
      a.breast = editBreast;
    }

    saveActs();
    updateDisplay();
    closeModal("editModal");
  });

  document.getElementById("editDeleteBtn").addEventListener("click", ()=>{
    if(!confirm("Obrisati zapis?")) return;
    activities = activities.filter(a=>a.id !== editId);
    saveActs();
    updateDisplay();
    closeModal("editModal");
  });

  // click handlers for edit/delete in lists
  document.addEventListener("click", (e)=>{
    const edit = e.target.closest("[data-edit]");
    const del  = e.target.closest("[data-del]");
    if(edit){
      editId = edit.dataset.edit;
      openModal("editModal");
    }
    if(del){
      const id = del.dataset.del;
      if(!confirm("Obrisati zapis?")) return;
      activities = activities.filter(a=>a.id !== id);
      saveActs();
      updateDisplay();
    }
  });

  // ---- Navigation ----
  function toggleHistory(force){
    isHistory = typeof force === "boolean" ? force : !isHistory;
    updateDisplay();
    // always reset scroll to top for better mobile UX
    document.getElementById("mainList").scrollTo({top:0, behavior:"instant"});
    window.scrollTo({top:0, behavior:"instant"});
  }

  document.getElementById("btnHistory").addEventListener("click", ()=> toggleHistory(true));
  document.getElementById("toggleView").addEventListener("click", ()=> toggleHistory());

  // Hero buttons open modals
  document.getElementById("heroSleepBtn").addEventListener("click", ()=> openModal("sleepModal"));
  document.getElementById("heroFeedBtn").addEventListener("click", ()=> openModal("feedModal"));

  // ---- Active timers tick in modals (analog + digital) ----
  function tickActiveTimersInModals(){
    // Sleep modal
    if(document.getElementById("sleepModal").classList.contains("active") && activeSleep){
      const elapsed = Date.now() - activeSleep.startMs;
      document.getElementById("sleepElapsed").textContent = hmsFromMs(elapsed);
      document.getElementById("sleepMeta").textContent = `Počeo: ${formatStamp(activeSleep.startMs)} • ${timeAgoSeconds(activeSleep.startMs)}`;
      setAnalog(
        document.getElementById("sleepH"),
        document.getElementById("sleepM"),
        document.getElementById("sleepS"),
        elapsed
      );
    }
    // Feeding modal
    if(document.getElementById("feedModal").classList.contains("active") && activeFeeding){
      const elapsed = Date.now() - activeFeeding.startMs;
      document.getElementById("feedElapsed").textContent = hmsFromMs(elapsed);
      const b = activeFeeding.breast==="left" ? "Lijeva" : activeFeeding.breast==="right" ? "Desna" : "Obje";
      document.getElementById("feedMeta").textContent = `Počelo: ${formatStamp(activeFeeding.startMs)} • Dojka: ${b}`;
      setAnalog(
        document.getElementById("feedH"),
        document.getElementById("feedM"),
        document.getElementById("feedS"),
        elapsed
      );
    }
  }

  // Init
  updateDisplay();
  ensureIntervals();
</script>
</body>
</html>
