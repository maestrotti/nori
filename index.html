<!DOCTYPE html>
<html lang="bs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Nori — San & Hranjenje</title>
  <style>
    :root{
      --bg: rgba(252,252,249,1);
      --surface: rgba(255,255,255,0.78);
      --surface2: rgba(255,255,255,0.92);
      --text: rgba(31,33,33,1);
      --muted: rgba(98,108,113,1);
      --border: rgba(94,82,64,0.16);

      --teal: rgba(33,128,141,1);
      --pink: rgba(219,39,119,1);
      --purple: rgba(168,85,247,1);
      --orange: rgba(249,115,22,1);
      --green: rgba(34,197,94,1);

      --r12: 14px;
      --r16: 16px;
      --r20: 20px;
      --rfull: 9999px;

      --sh1: 0 10px 30px rgba(0,0,0,0.06);
      --sh2: 0 2px 10px rgba(0,0,0,0.06);
      --ring: 0 0 0 3px rgba(33,128,141,0.18);

      /* S22 Ultra safe-area + big bottom gesture zone */
      --safeB: env(safe-area-inset-bottom, 0px);
      --tapMin: 48px;
    }
    @media (prefers-color-scheme: dark){
      :root{
        --bg: rgba(31,33,33,1);
        --surface: rgba(38,40,40,0.78);
        --surface2: rgba(38,40,40,0.92);
        --text: rgba(245,245,245,1);
        --muted: rgba(167,169,169,0.78);
        --border: rgba(167,169,169,0.20);

        --sh1: 0 12px 34px rgba(0,0,0,0.35);
        --sh2: 0 2px 10px rgba(0,0,0,0.30);
        --ring: 0 0 0 3px rgba(74,222,128,0.14);
      }
    }
    *{ box-sizing:border-box; margin:0; padding:0; }
    html,body{ height:100%; }
    body{
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background:
        radial-gradient(1100px 750px at 8% -10%, rgba(33,128,141,0.18), transparent 55%),
        radial-gradient(980px 720px at 98% 5%, rgba(168,85,247,0.16), transparent 55%),
        radial-gradient(900px 650px at 52% 112%, rgba(219,39,119,0.13), transparent 55%),
        var(--bg);
      color: var(--text);
      padding-bottom: calc(var(--safeB) + 20px);
      overflow-x:hidden;
      -webkit-tap-highlight-color: transparent;
    }
    body::before{
      content:"NORI";
      position:fixed; inset:0;
      display:flex; align-items:center; justify-content:center;
      font-weight: 900;
      letter-spacing: 0.25em;
      font-size: min(18vw, 140px);
      color: rgba(33,128,141,0.08);
      text-shadow: 0 10px 30px rgba(0,0,0,0.06);
      pointer-events:none;
      z-index:0;
      transform: translateY(-6px);
      user-select:none;
    }
    @media (prefers-color-scheme: dark){
      body::before{ color: rgba(74,222,128,0.07); text-shadow: 0 10px 26px rgba(0,0,0,0.35); }
    }

    .app{ position:relative; z-index:1; max-width: 520px; margin: 0 auto; padding: 0 14px 18px; }
    .header{
      position: sticky; top:0; z-index:120;
      padding: 16px 14px;
      background: linear-gradient(180deg, var(--surface2), var(--surface));
      border-bottom: 1px solid var(--border);
      box-shadow: var(--sh2);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      margin: 0 -14px;
    }
    .header-top{ display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
    .brand{ display:flex; flex-direction:column; gap:6px; min-width:0; }
    .brand h1{
      font-size: 22px; font-weight: 1000;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--teal);
      white-space: nowrap; overflow:hidden; text-overflow: ellipsis;
    }
    .sub{ font-size: 12px; color: var(--muted); display:flex; gap:10px; flex-wrap:wrap; }
    .pill{
      display:inline-flex; align-items:center; gap:8px;
      padding: 6px 10px;
      border-radius: var(--rfull);
      border:1px solid var(--border);
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      max-width:100%;
      white-space: nowrap;
    }
    @media (prefers-color-scheme: dark){
      .pill{ background: rgba(255,255,255,0.06); }
    }
    .icon-btn{
      width: var(--tapMin); height: var(--tapMin);
      border-radius: var(--r12);
      border:1px solid var(--border);
      background: rgba(255,255,255,0.22);
      display:flex; align-items:center; justify-content:center;
      box-shadow: var(--sh2);
      cursor:pointer;
      user-select:none;
      flex-shrink:0;
    }
    .icon-btn:active{ transform: scale(0.98); box-shadow:none; }
    .icon-btn span{ font-size: 18px; }

    .grid2{
      padding: 14px 0 0;
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .card-btn{
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.70));
      border:1px solid var(--border);
      border-radius: var(--r20);
      padding: 14px;
      display:flex; gap:12px; align-items:center;
      box-shadow: var(--sh1);
      cursor:pointer;
      user-select:none;
      min-height: 92px;
      overflow:hidden;
    }
    @media (prefers-color-scheme: dark){
      .card-btn{ background: linear-gradient(180deg, rgba(38,40,40,0.92), rgba(38,40,40,0.72)); }
    }
    .card-btn:active{ transform: scale(0.985); box-shadow:none; }
    .c-ico{
      width: 48px; height:48px;
      border-radius: 16px;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
      border: 1px solid rgba(255,255,255,0.18);
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    }
    .c-ico span{ font-size: 22px; line-height:1; }
    .sleep .c-ico{ background: rgba(192,132,252,0.18); color: var(--purple); }
    .feed .c-ico{ background: rgba(236,72,153,0.16); color: var(--pink); }

    .c-mid{ min-width:0; flex:1; display:flex; flex-direction:column; gap:4px; }
    .c-title{ font-size: 14px; font-weight: 1000; letter-spacing:0.01em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .c-sub{ font-size: 12px; color: var(--muted); line-height: 1.25; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .c-right{ font-size: 11px; color: var(--muted); white-space:nowrap; margin-left: 6px; flex-shrink:0; }

    .section{
      margin-top: 14px;
      padding: 14px;
      border-radius: var(--r20);
      border:1px solid var(--border);
      background: linear-gradient(180deg, rgba(255,255,255,0.88), rgba(255,255,255,0.72));
      box-shadow: var(--sh1);
    }
    @media (prefers-color-scheme: dark){
      .section{ background: linear-gradient(180deg, rgba(38,40,40,0.92), rgba(38,40,40,0.72)); }
    }
    .section-header{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom: 12px; }
    .section-title{ font-size: 16px; font-weight: 1000; letter-spacing:-0.01em; }
    .link{
      font-size: 13px; color: var(--teal);
      cursor:pointer; user-select:none;
      font-weight: 900;
      text-decoration:none;
      white-space:nowrap;
    }

    .list{ display:flex; flex-direction:column; gap:10px; }
    .item{
      display:flex; gap:12px;
      padding: 12px;
      border-radius: 16px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.26);
      overflow:hidden;
      align-items:flex-start;
    }
    @media (prefers-color-scheme: dark){
      .item{ background: rgba(255,255,255,0.06); }
    }
    .i-ico{
      width: 46px; height:46px;
      border-radius: 16px;
      display:flex; align-items:center; justify-content:center;
      flex-shrink:0;
      border:1px solid rgba(255,255,255,0.14);
    }
    .i-ico span{ font-size: 22px; }
    .i-content{ flex:1; min-width:0; }
    .i-title{ font-weight: 1000; font-size: 13px; line-height:1.15; margin-bottom: 3px; }
    .i-details{ font-size: 12px; color: var(--muted); line-height:1.35; overflow-wrap:anywhere; }
    .i-time{ font-size: 11px; color: var(--muted); white-space: nowrap; margin-left: 6px; flex-shrink:0; }

    .actions{
      display:flex; gap:8px; margin-top: 8px; flex-wrap:wrap;
    }
    .small-btn{
      min-height: 38px;
      padding: 8px 10px;
      border-radius: 12px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.18);
      color: var(--text);
      font-weight: 900;
      font-size: 12px;
      cursor:pointer;
      user-select:none;
    }
    @media (prefers-color-scheme: dark){
      .small-btn{ background: rgba(255,255,255,0.06); }
    }
    .small-btn:active{ transform: scale(0.98); }
    .danger{ border-color: rgba(249,115,22,0.35); background: rgba(249,115,22,0.10); color: var(--orange); }

    .day-group{
      margin-top: 10px;
      border:1px solid var(--border);
      border-radius: 16px;
      overflow:hidden;
      background: rgba(255,255,255,0.18);
    }
    @media (prefers-color-scheme: dark){
      .day-group{ background: rgba(255,255,255,0.05); }
    }
    .day-header{
      padding: 10px 12px;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      background: linear-gradient(180deg, rgba(33,128,141,0.10), rgba(33,128,141,0.03));
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 74px;
      z-index: 10;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .day-title{ font-weight: 1000; font-size: 13px; }
    .day-meta{ font-size: 11px; color: var(--muted); white-space:nowrap; }
    .day-body{ padding: 10px; display:flex; flex-direction:column; gap:10px; }

    .empty{
      text-align:center;
      padding: 18px 10px;
      color: var(--muted);
      font-size: 13px;
    }

    /* Modal */
    .modal{
      display:none;
      position: fixed; inset:0;
      background: rgba(0,0,0,0.55);
      z-index: 1000;
      padding-bottom: calc(var(--safeB));
      animation: fadeIn .18s ease-out;
    }
    .modal.active{ display:flex; align-items:flex-end; }
    @keyframes fadeIn{ from{opacity:0;} to{opacity:1;} }
    @keyframes slideUp{ from{ transform: translateY(100%);} to{ transform: translateY(0);} }
    .sheet{
      width: 100%;
      max-height: 88vh;
      border-radius: 22px 22px 0 0;
      padding: 18px 16px calc(18px + var(--safeB));
      background: linear-gradient(180deg, var(--surface2), var(--surface));
      border-top: 1px solid var(--border);
      box-shadow: 0 -20px 50px rgba(0,0,0,0.20);
      overflow-y: auto;
      animation: slideUp .25s ease-out;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }
    .m-head{ display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom: 14px; }
    .m-title{ font-size: 18px; font-weight: 1000; letter-spacing:-0.01em; }
    .close{ font-size: 28px; color: var(--muted); cursor:pointer; user-select:none; line-height:1; }

    .timer-box{
      padding: 16px 14px;
      border-radius: 18px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.18);
      margin-bottom: 14px;
      overflow:hidden;
    }
    @media (prefers-color-scheme: dark){
      .timer-box{ background: rgba(255,255,255,0.06); }
    }
    .timer-row{ display:flex; gap: 14px; align-items:center; justify-content:space-between; }
    .analog{
      width: 92px; height: 92px;
      border-radius: 999px;
      border:1px solid var(--border);
      background:
        radial-gradient(circle at 50% 50%, rgba(33,128,141,0.14), transparent 55%),
        rgba(255,255,255,0.14);
      position:relative;
      flex-shrink:0;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.04);
    }
    @media (prefers-color-scheme: dark){
      .analog{ background:
        radial-gradient(circle at 50% 50%, rgba(74,222,128,0.10), transparent 55%),
        rgba(255,255,255,0.05); }
    }
    .hand{
      position:absolute; left:50%; top:50%;
      transform-origin: 50% 100%;
      transform: translate(-50%,-100%) rotate(0deg);
      border-radius: 999px;
    }
    .hand.sec{ width:2px; height:40px; background: var(--orange); }
    .hand.min{ width:3px; height:34px; background: var(--teal); opacity:0.95; }
    .hand.hour{ width:4px; height:26px; background: var(--text); opacity:0.85; }
    .pin{
      position:absolute; left:50%; top:50%;
      width:10px; height:10px; border-radius:999px;
      transform: translate(-50%,-50%);
      background: var(--text);
      box-shadow: 0 2px 8px rgba(0,0,0,0.20);
    }

    .timer-digital{
      flex:1; min-width:0;
      display:flex; flex-direction:column; gap:6px;
      align-items:flex-end;
    }
    .t-big{
      font-size: 38px;
      font-weight: 1000;
      font-variant-numeric: tabular-nums;
      letter-spacing:-0.02em;
      color: var(--teal);
      white-space:nowrap;
    }
    .t-sub{ font-size: 12px; color: var(--muted); text-align:right; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    .form-group{ margin-bottom: 12px; }
    .label{ display:block; font-size: 13px; font-weight: 900; margin-bottom: 8px; }
    .input, .select, .textarea{
      width:100%;
      min-height: var(--tapMin);
      padding: 12px 12px;
      border-radius: 14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.18);
      color: var(--text);
      font-size: 15px;
      outline:none;
    }
    @media (prefers-color-scheme: dark){
      .input, .select, .textarea{ background: rgba(255,255,255,0.06); }
    }
    .input:focus, .select:focus, .textarea:focus{
      box-shadow: var(--ring);
      border-color: rgba(33,128,141,0.45);
    }
    .textarea{ min-height: 92px; resize: vertical; font-family: inherit; }

    .row2{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btns{ display:flex; gap:10px; flex-wrap:wrap; margin: 10px 0 12px; }
    .toggle{
      flex: 1 1 120px;
      min-width: 120px;
      min-height: var(--tapMin);
      padding: 12px;
      border-radius: 14px;
      border:1px solid var(--border);
      background: rgba(255,255,255,0.16);
      color: var(--text);
      font-weight: 1000;
      cursor:pointer;
      user-select:none;
      white-space:nowrap;
      overflow:hidden;
      text-overflow: ellipsis;
      transition: all .16s ease;
    }
    @media (prefers-color-scheme: dark){
      .toggle{ background: rgba(255,255,255,0.06); }
    }
    .toggle.active{
      background: rgba(33,128,141,0.95);
      color:#fff;
      border-color: rgba(33,128,141,0.95);
      box-shadow: 0 10px 20px rgba(33,128,141,0.18);
    }

    .primary{
      width:100%;
      min-height: calc(var(--tapMin) + 6px);
      padding: 14px;
      border-radius: 16px;
      border:none;
      cursor:pointer;
      user-select:none;
      font-size: 15px;
      font-weight: 1000;
      color:#fff;
      background: rgba(33,128,141,1);
      box-shadow: 0 14px 30px rgba(33,128,141,0.18);
      transition: all .18s ease;
    }
    .primary:active{ transform: scale(0.985); filter: brightness(0.96); box-shadow:none; }
    .primary.purple{ background: var(--purple); box-shadow: 0 14px 30px rgba(168,85,247,0.18); }
    .primary.pink{ background: var(--pink); box-shadow: 0 14px 30px rgba(219,39,119,0.18); }
    .primary.green{ background: var(--green); box-shadow: 0 14px 30px rgba(34,197,94,0.18); }
    .primary.orange{ background: var(--orange); box-shadow: 0 14px 30px rgba(249,115,22,0.18); }

    @media (max-width: 360px){
      .grid2{ grid-template-columns: 1fr; }
      .t-big{ font-size: 34px; }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div class="header-top">
        <div class="brand">
          <h1>Nori — San & Hranjenje</h1>
          <div class="sub">
            <span class="pill">San: <strong id="pillSleepAgo">-</strong></span>
            <span class="pill">Hranjenje: <strong id="pillFeedAgo">-</strong></span>
          </div>
        </div>
        <div style="display:flex; gap:10px;">
          <div class="icon-btn" id="btnHistory" title="Historija"><span>📜</span></div>
          <div class="icon-btn" id="btnExport" title="Export"><span>⬇️</span></div>
        </div>
      </div>
    </div>

    <div class="grid2">
      <div class="card-btn sleep" id="openSleep">
        <div class="c-ico"><span>😴</span></div>
        <div class="c-mid">
          <div class="c-title">San</div>
          <div class="c-sub" id="sleepStatusSub">-</div>
        </div>
        <div class="c-right" id="sleepStatusRight"></div>
      </div>

      <div class="card-btn feed" id="openFeed">
        <div class="c-ico"><span>🍼</span></div>
        <div class="c-mid">
          <div class="c-title">Hranjenje</div>
          <div class="c-sub" id="feedStatusSub">-</div>
        </div>
        <div class="c-right" id="feedStatusRight"></div>
      </div>
    </div>

    <div class="section" id="homeNow">
      <div class="section-header">
        <div class="section-title">Trenutno / posljednje</div>
        <a class="link" id="viewAll">Historija</a>
      </div>
      <div class="list" id="homeList"></div>
    </div>

    <div class="section" id="historySection" style="display:none;">
      <div class="section-header">
        <div class="section-title">Historija (po danima)</div>
        <a class="link" id="backHome">Početna</a>
      </div>
      <div id="historyList"></div>
    </div>
  </div>

  <!-- Sleep modal -->
  <div class="modal" id="sleepModal">
    <div class="sheet">
      <div class="m-head">
        <div class="m-title">San</div>
        <div class="close" data-close="sleepModal">×</div>
      </div>

      <div class="timer-box" id="sleepTimerBox" style="display:none;">
        <div class="timer-row">
          <div class="analog" id="sleepAnalog">
            <div class="hand hour" id="sleepH"></div>
            <div class="hand min" id="sleepM"></div>
            <div class="hand sec" id="sleepS"></div>
            <div class="pin"></div>
          </div>
          <div class="timer-digital">
            <div class="t-big" id="sleepElapsed">00:00:00</div>
            <div class="t-sub" id="sleepMeta">-</div>
          </div>
        </div>
      </div>

      <div class="row2">
        <div class="form-group">
          <label class="label">Datum početka</label>
          <input class="input" type="date" id="sleepStartDate">
        </div>
        <div class="form-group">
          <label class="label">Vrijeme početka (HH:MM:SS)</label>
          <input class="input" type="text" id="sleepStartClock" placeholder="npr. 14:03:12">
        </div>
      </div>

      <div class="form-group" id="sleepEndRow" style="display:none;">
        <div class="row2">
          <div>
            <label class="label">Datum buđenja</label>
            <input class="input" type="date" id="sleepEndDate">
          </div>
          <div>
            <label class="label">Vrijeme buđenja (HH:MM:SS)</label>
            <input class="input" type="text" id="sleepEndClock" placeholder="npr. 15:11:07">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="label">Bilješke (opcionalno)</label>
        <textarea class="textarea" id="sleepNotes" placeholder="npr. zaspao brzo..."></textarea>
      </div>

      <button class="primary purple" id="sleepStartBtn">Dijete zaspalo</button>
      <button class="primary orange" id="sleepStopBtn" style="display:none;">Dijete se probudilo</button>
    </div>
  </div>

  <!-- Feeding modal -->
  <div class="modal" id="feedModal">
    <div class="sheet">
      <div class="m-head">
        <div class="m-title">Hranjenje</div>
        <div class="close" data-close="feedModal">×</div>
      </div>

      <div class="timer-box" id="feedTimerBox" style="display:none;">
        <div class="timer-row">
          <div class="analog" id="feedAnalog">
            <div class="hand hour" id="feedH"></div>
            <div class="hand min" id="feedM"></div>
            <div class="hand sec" id="feedS"></div>
            <div class="pin"></div>
          </div>
          <div class="timer-digital">
            <div class="t-big" id="feedElapsed">00:00:00</div>
            <div class="t-sub" id="feedMeta">-</div>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="label">Dojka</label>
        <div class="btns" id="breastBtns">
          <button class="toggle" data-breast="left">Lijeva</button>
          <button class="toggle" data-breast="right">Desna</button>
          <button class="toggle" data-breast="both">Obje</button>
        </div>
      </div>

      <div class="row2">
        <div class="form-group">
          <label class="label">Datum početka</label>
          <input class="input" type="date" id="feedStartDate">
        </div>
        <div class="form-group">
          <label class="label">Vrijeme početka (HH:MM:SS)</label>
          <input class="input" type="text" id="feedStartClock" placeholder="npr. 16:22:01">
        </div>
      </div>

      <div class="row2" id="feedEndRow" style="display:none;">
        <div class="form-group">
          <label class="label">Datum kraja</label>
          <input class="input" type="date" id="feedEndDate">
        </div>
        <div class="form-group">
          <label class="label">Vrijeme kraja (HH:MM:SS)</label>
          <input class="input" type="text" id="feedEndClock" placeholder="npr. 16:31:47">
        </div>
      </div>

      <div class="form-group">
        <label class="label">Bilješke (opcionalno)</label>
        <textarea class="textarea" id="feedNotes" placeholder="npr. nemiran, pauze..."></textarea>
      </div>

      <button class="primary pink" id="feedStartBtn">Počinje jesti</button>
      <button class="primary green" id="feedStopBtn" style="display:none;">Završio jesti</button>
    </div>
  </div>

  <!-- Edit modal -->
  <div class="modal" id="editModal">
    <div class="sheet">
      <div class="m-head">
        <div class="m-title">Uredi zapis</div>
        <div class="close" data-close="editModal">×</div>
      </div>

      <div class="form-group">
        <label class="label">Tip</label>
        <input class="input" id="editType" disabled />
      </div>

      <div class="form-group" id="editBreastGroup" style="display:none;">
        <label class="label">Dojka</label>
        <div class="btns" id="editBreastBtns">
          <button class="toggle" data-breast="left">Lijeva</button>
          <button class="toggle" data-breast="right">Desna</button>
          <button class="toggle" data-breast="both">Obje</button>
        </div>
      </div>

      <div class="row2">
        <div class="form-group">
          <label class="label">Start datum</label>
          <input class="input" type="date" id="editStartDate">
        </div>
        <div class="form-group">
          <label class="label">Start vrijeme (HH:MM:SS)</label>
          <input class="input" type="text" id="editStartClock">
        </div>
      </div>

      <div class="row2">
        <div class="form-group">
          <label class="label">Kraj datum</label>
          <input class="input" type="date" id="editEndDate">
        </div>
        <div class="form-group">
          <label class="label">Kraj vrijeme (HH:MM:SS)</label>
          <input class="input" type="text" id="editEndClock">
        </div>
      </div>

      <div class="form-group">
        <label class="label">Bilješke</label>
        <textarea class="textarea" id="editNotes"></textarea>
      </div>

      <button class="primary" id="editSaveBtn">Spremi izmjene</button>
      <div style="height:10px;"></div>
      <button class="primary orange" id="editDeleteBtn">Obriši zapis</button>
    </div>
  </div>

<script>
  // ---- Storage keys (tvoj stil) ----
  const KEY_ACTS = "babyActivities_v2_sleep_feed";
  const KEY_ACTIVE_SLEEP = "activeSleep_v2";
  const KEY_ACTIVE_FEED = "activeFeeding_v2";

  let activities = JSON.parse(localStorage.getItem(KEY_ACTS) || "[]");
  let activeSleep = JSON.parse(localStorage.getItem(KEY_ACTIVE_SLEEP) || "null");
  let activeFeeding = JSON.parse(localStorage.getItem(KEY_ACTIVE_FEED) || "null");

  // UI state
  let homeInterval = null;
  let selectedBreast = null;

  // Edit state
  let editId = null;
  let editBreast = null;

  // ---- Helpers ----
  function pad2(n){ return String(n).padStart(2,"0"); }
  function escapeHtml(s){
    return String(s ?? "")
      .replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;")
      .replaceAll('"',"&quot;").replaceAll("'","&#039;");
  }
  function uid(){
    return "a_" + Math.random().toString(16).slice(2) + "_" + Date.now().toString(16);
  }

  function parseClockToHMS(clock){
    const m = /^(\d{1,2}):(\d{2})(?::(\d{2}))?$/.exec((clock||"").trim());
    if(!m) return null;
    const hh = Number(m[1]), mm = Number(m[2]), ss = Number(m[3] ?? "00");
    if(hh<0||hh>23||mm<0||mm>59||ss<0||ss>59) return null;
    return {hh,mm,ss};
  }
  function dateClockToMs(dateStr, clockStr){
    if(!dateStr) return null;
    const hms = parseClockToHMS(clockStr);
    if(!hms) return null;
    // local time
    const d = new Date(`${dateStr}T${pad2(hms.hh)}:${pad2(hms.mm)}:${pad2(hms.ss)}`);
    if(Number.isNaN(d.getTime())) return null;
    return d.getTime();
  }
  function msToISO(ms){ return new Date(ms).toISOString(); }
  function msToDate(ms){
    const d = new Date(ms);
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }
  function msToClock(ms){
    const d = new Date(ms);
    return `${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  }

  function hmsFromMs(ms){
    const total = Math.max(0, Math.floor(ms/1000));
    const h = Math.floor(total/3600);
    const m = Math.floor((total%3600)/60);
    const s = total%60;
    return `${pad2(h)}:${pad2(m)}:${pad2(s)}`;
  }

  function formatStamp(ms){
    const d = new Date(ms);
    return `${pad2(d.getDate())}.${pad2(d.getMonth()+1)}.${d.getFullYear()} ${pad2(d.getHours())}:${pad2(d.getMinutes())}:${pad2(d.getSeconds())}`;
  }

  function timeAgoSeconds(ms){
    const diff = Date.now() - ms;
    const sec = Math.floor(diff/1000);
    if(sec < 0) return "u budućnosti";
    if(sec < 5) return "upravo";
    if(sec < 60) return `prije ${sec}s`;
    const min = Math.floor(sec/60);
    if(min < 60) return `prije ${min}m ${sec%60}s`;
    const hr = Math.floor(min/60);
    if(hr < 24) return `prije ${hr}h ${min%60}m ${sec%60}s`;
    const days = Math.floor(hr/24);
    return `prije ${days}d ${hr%24}h ${min%60}m`;
  }

  function dayKey(ms){
    const d = new Date(ms);
    return `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
  }
  function dayLabel(key){
    const [y,m,d] = key.split("-").map(Number);
    const dt = new Date(`${y}-${pad2(m)}-${pad2(d)}T00:00:00`);
    const today = new Date(); today.setHours(0,0,0,0);
    const yest = new Date(today); yest.setDate(yest.getDate()-1);
    if(dt.getTime() === today.getTime()) return "Danas";
    if(dt.getTime() === yest.getTime()) return "Jučer";
    return `${pad2(d)}.${pad2(m)}.${y}`;
  }

  function saveActs(){
    localStorage.setItem(KEY_ACTS, JSON.stringify(activities));
  }
  function saveActive(){
    if(activeSleep) localStorage.setItem(KEY_ACTIVE_SLEEP, JSON.stringify(activeSleep));
    else localStorage.removeItem(KEY_ACTIVE_SLEEP);
    if(activeFeeding) localStorage.setItem(KEY_ACTIVE_FEED, JSON.stringify(activeFeeding));
    else localStorage.removeItem(KEY_ACTIVE_FEED);
  }

  function iconFor(type){
    if(type==="sleep") return {emoji:"😴", bg:"rgba(192,132,252,0.18)", color:"rgba(168,85,247,1)"};
    return {emoji:"🍼", bg:"rgba(236,72,153,0.16)", color:"rgba(219,39,119,1)"};
  }
  function titleFor(a){
    if(a.type==="sleep") return "San";
    const b = a.breast==="left" ? "Lijeva" : a.breast==="right" ? "Desna" : "Obje";
    return `Hranjenje — ${b}`;
  }

  function detailsFor(a){
    const start = formatStamp(a.startMs);
    const end = formatStamp(a.endMs);
    const dur = hmsFromMs(a.endMs - a.startMs);
    if(a.type==="sleep"){
      // “koliko je bio budan” = vrijeme budan od kraja sna do sada (ili do sljedećeg sna - za sada do sada)
      const awake = timeAgoSeconds(a.endMs);
      const notes = a.notes ? ` • ${escapeHtml(a.notes)}` : "";
      return `Start: ${start} • Kraj: ${end} • Trajanje: ${dur} • Budan: ${awake}${notes}`;
    }else{
      const since = timeAgoSeconds(a.startMs);
      const notes = a.notes ? ` • ${escapeHtml(a.notes)}` : "";
      return `Start: ${start} • Kraj: ${end} • Trajanje: ${dur} • Počelo: ${since}${notes}`;
    }
  }

  function itemHTML(a){
    const ic = iconFor(a.type);
    const t = titleFor(a);
    const d = detailsFor(a);
    return `
      <div class="item">
        <div class="i-ico" style="background:${ic.bg}; color:${ic.color};"><span>${ic.emoji}</span></div>
        <div class="i-content">
          <div class="i-title">${escapeHtml(t)}</div>
          <div class="i-details">${d}</div>
          <div class="actions">
            <button class="small-btn" data-edit="${a.id}">Uredi</button>
            <button class="small-btn danger" data-del="${a.id}">Obriši</button>
          </div>
        </div>
        <div class="i-time">${timeAgoSeconds(a.startMs)}</div>
      </div>
    `;
  }

  function activeHTML(type){
    if(type==="sleep" && activeSleep){
      const ic = iconFor("sleep");
      const elapsed = Date.now() - activeSleep.startMs;
      const start = formatStamp(activeSleep.startMs);
      return `
        <div class="item">
          <div class="i-ico" style="background:${ic.bg}; color:${ic.color};"><span>${ic.emoji}</span></div>
          <div class="i-content">
            <div class="i-title">San aktivan</div>
            <div class="i-details">Počeo: ${start} • Traje: ${hmsFromMs(elapsed)}</div>
          </div>
          <div class="i-time">sada</div>
        </div>
      `;
    }
    if(type==="feeding" && activeFeeding){
      const ic = iconFor("feeding");
      const elapsed = Date.now() - activeFeeding.startMs;
      const b = activeFeeding.breast==="left" ? "Lijeva" : activeFeeding.breast==="right" ? "Desna" : "Obje";
      const start = formatStamp(activeFeeding.startMs);
      return `
        <div class="item">
          <div class="i-ico" style="background:${ic.bg}; color:${ic.color};"><span>${ic.emoji}</span></div>
          <div class="i-content">
            <div class="i-title">Hranjenje aktivno — ${b}</div>
            <div class="i-details">Počelo: ${start} • Traje: ${hmsFromMs(elapsed)}</div>
          </div>
          <div class="i-time">sada</div>
        </div>
      `;
    }
    return "";
  }

  function updateHeaderPills(){
    const lastSleep = activities.filter(a=>a.type==="sleep").sort((a,b)=>b.endMs-a.endMs)[0];
    const lastFeed = activities.filter(a=>a.type==="feeding").sort((a,b)=>b.endMs-a.endMs)[0];
    document.getElementById("pillSleepAgo").textContent = lastSleep ? timeAgoSeconds(lastSleep.endMs) : "-";
    document.getElementById("pillFeedAgo").textContent = lastFeed ? timeAgoSeconds(lastFeed.endMs) : "-";
  }

  function updateQuickCards(){
    const sleepSub = document.getElementById("sleepStatusSub");
    const sleepRight = document.getElementById("sleepStatusRight");
    if(activeSleep){
      sleepSub.textContent = `Spava • ${hmsFromMs(Date.now() - activeSleep.startMs)}`;
      sleepRight.textContent = "U toku";
    }else{
      const last = activities.filter(a=>a.type==="sleep").sort((a,b)=>b.endMs-a.endMs)[0];
      sleepSub.textContent = last ? `Zadnje buđenje: ${formatStamp(last.endMs)}` : "Nema zapisa";
      sleepRight.textContent = last ? timeAgoSeconds(last.endMs) : "";
    }

    const feedSub = document.getElementById("feedStatusSub");
    const feedRight = document.getElementById("feedStatusRight");
    if(activeFeeding){
      const b = activeFeeding.breast==="left" ? "Lijeva" : activeFeeding.breast==="right" ? "Desna" : "Obje";
      feedSub.textContent = `Jede (${b}) • ${hmsFromMs(Date.now() - activeFeeding.startMs)}`;
      feedRight.textContent = "U toku";
    }else{
      const last = activities.filter(a=>a.type==="feeding").sort((a,b)=>b.endMs-a.endMs)[0];
      feedSub.textContent = last ? `Završilo: ${formatStamp(last.endMs)}` : "Nema zapisa";
      feedRight.textContent = last ? timeAgoSeconds(last.endMs) : "";
    }
  }

  function updateHomeList(){
    const list = document.getElementById("homeList");
    const blocks = [];
    if(activeSleep) blocks.push(activeHTML("sleep"));
    if(activeFeeding) blocks.push(activeHTML("feeding"));

    // last per type (excluding active)
    const lastSleep = activities.filter(a=>a.type==="sleep").sort((a,b)=>b.endMs-a.endMs)[0];
    const lastFeed = activities.filter(a=>a.type==="feeding").sort((a,b)=>b.endMs-a.endMs)[0];
    if(!activeSleep && lastSleep) blocks.push(itemHTML(lastSleep));
    if(!activeFeeding && lastFeed) blocks.push(itemHTML(lastFeed));

    list.innerHTML = blocks.length ? blocks.join("") : `<div class="empty">Nema aktivnosti.</div>`;
  }

  function updateHistory(){
    const container = document.getElementById("historyList");
    const sorted = [...activities].sort((a,b)=>b.startMs-a.startMs);
    if(!sorted.length){
      container.innerHTML = `<div class="empty">Nema zapisa.</div>`;
      return;
    }
    const groups = {};
    for(const a of sorted){
      const k = dayKey(a.startMs);
      if(!groups[k]) groups[k]=[];
      groups[k].push(a);
    }
    const keys = Object.keys(groups).sort((a,b)=>a<b?1:-1);
    container.innerHTML = keys.map(k=>{
      const items = groups[k].map(a=>itemHTML(a)).join("");
      return `
        <div class="day-group">
          <div class="day-header">
            <div class="day-title">${dayLabel(k)}</div>
            <div class="day-meta">${groups[k].length} zapisa</div>
          </div>
          <div class="day-body">${items}</div>
        </div>
      `;
    }).join("");
  }

  function updateDisplay(){
    updateHeaderPills();
    updateQuickCards();
    updateHomeList();
    updateHistory();
  }

  function ensureIntervals(){
    if(homeInterval) return;
    homeInterval = setInterval(()=>{
      // refresh active from storage in case another tab updated
      activeSleep = JSON.parse(localStorage.getItem(KEY_ACTIVE_SLEEP) || "null");
      activeFeeding = JSON.parse(localStorage.getItem(KEY_ACTIVE_FEED) || "null");
      updateHeaderPills();
      updateQuickCards();
      updateHomeList();
      tickActiveTimersInModals();
    }, 1000);
  }

  // ---- Analog clock for active timers (mechanical feel) ----
  function setAnalog(elH, elM, elS, elapsedMs){
    const totalSec = Math.floor(Math.max(0, elapsedMs)/1000);
    const sec = totalSec % 60;
    const min = Math.floor(totalSec/60) % 60;
    const hr = Math.floor(totalSec/3600) % 12;

    const sDeg = sec * 6;                 // 360/60
    const mDeg = min * 6 + sec * 0.1;     // smooth
    const hDeg = hr * 30 + min * 0.5;     // smooth

    elS.style.transform = `translate(-50%,-100%) rotate(${sDeg}deg)`;
    elM.style.transform = `translate(-50%,-100%) rotate(${mDeg}deg)`;
    elH.style.transform = `translate(-50%,-100%) rotate(${hDeg}deg)`;
  }

  function tickActiveTimersInModals(){
    // Sleep modal
    if(document.getElementById("sleepModal").classList.contains("active") && activeSleep){
      const elapsed = Date.now() - activeSleep.startMs;
      document.getElementById("sleepElapsed").textContent = hmsFromMs(elapsed);
      document.getElementById("sleepMeta").textContent = `Počeo: ${formatStamp(activeSleep.startMs)} • ${timeAgoSeconds(activeSleep.startMs)}`;
      setAnalog(
        document.getElementById("sleepH"),
        document.getElementById("sleepM"),
        document.getElementById("sleepS"),
        elapsed
      );
    }
    // Feed modal
    if(document.getElementById("feedModal").classList.contains("active") && activeFeeding){
      const elapsed = Date.now() - activeFeeding.startMs;
      document.getElementById("feedElapsed").textContent = hmsFromMs(elapsed);
      const b = activeFeeding.breast==="left" ? "Lijeva" : activeFeeding.breast==="right" ? "Desna" : "Obje";
      document.getElementById("feedMeta").textContent = `Počeo: ${formatStamp(activeFeeding.startMs)} • Dojka: ${b}`;
      setAnalog(
        document.getElementById("feedH"),
        document.getElementById("feedM"),
        document.getElementById("feedS"),
        elapsed
      );
    }
  }

  // ---- Modals open/close ----
  function openModal(id){
    document.getElementById(id).classList.add("active");
    if(id==="sleepModal") setupSleepModal();
    if(id==="feedModal") setupFeedModal();
    if(id==="editModal") setupEditModal();
    tickActiveTimersInModals();
  }
  function closeModal(id){
    document.getElementById(id).classList.remove("active");
  }
  document.querySelectorAll(".modal").forEach(m=>{
    m.addEventListener("click", (e)=>{
      if(e.target === m) closeModal(m.id);
    });
  });
  document.querySelectorAll("[data-close]").forEach(x=>{
    x.addEventListener("click", ()=> closeModal(x.dataset.close));
  });

  // ---- Sleep flow ----
  function setupSleepModal(){
    const now = Date.now();
    document.getElementById("sleepStartDate").value = msToDate(now);
    document.getElementById("sleepStartClock").value = msToClock(now);

    if(activeSleep){
      document.getElementById("sleepTimerBox").style.display = "block";
      document.getElementById("sleepStartBtn").style.display = "none";
      document.getElementById("sleepStopBtn").style.display = "block";
      document.getElementById("sleepEndRow").style.display = "none";
    }else{
      document.getElementById("sleepTimerBox").style.display = "none";
      document.getElementById("sleepStartBtn").style.display = "block";
      document.getElementById("sleepStopBtn").style.display = "none";
      document.getElementById("sleepEndRow").style.display = "none";
      document.getElementById("sleepNotes").value = "";
    }
  }

  document.getElementById("sleepStartBtn").addEventListener("click", ()=>{
    if(activeSleep) return;
    const ms = dateClockToMs(
      document.getElementById("sleepStartDate").value,
      document.getElementById("sleepStartClock").value
    );
    if(ms===null) return alert("Unesi ispravno vrijeme (HH:MM:SS) i datum.");
    if(ms > Date.now() + 1000) return alert("Početak ne može biti u budućnosti.");

    activeSleep = { startMs: ms, startIso: msToISO(ms) };
    saveActive();
    updateDisplay();
    setupSleepModal();
  });

  document.getElementById("sleepStopBtn").addEventListener("click", ()=>{
    if(!activeSleep) return;
    const endMs = Date.now();
    if(endMs <= activeSleep.startMs) return alert("Greška u vremenima.");
    const a = {
      id: uid(),
      type: "sleep",
      startMs: activeSleep.startMs,
      endMs,
      startIso: activeSleep.startIso,
      endIso: msToISO(endMs),
      notes: document.getElementById("sleepNotes").value || "",
      createdAt: Date.now()
    };
    activities.push(a);
    activeSleep = null;
    saveActs();
    saveActive();
    updateDisplay();
    closeModal("sleepModal");
  });

  // ---- Feeding flow ----
  function clearBreastSelection(containerId){
    document.querySelectorAll(`#${containerId} .toggle`).forEach(b=>b.classList.remove("active"));
  }
  function setupFeedModal(){
    const now = Date.now();
    document.getElementById("feedStartDate").value = msToDate(now);
    document.getElementById("feedStartClock").value = msToClock(now);
    if(!activeFeeding){
      selectedBreast = null;
      clearBreastSelection("breastBtns");
      document.getElementById("feedNotes").value = "";
    }else{
      selectedBreast = activeFeeding.breast;
      clearBreastSelection("breastBtns");
      document.querySelectorAll(`#breastBtns .toggle`).forEach(btn=>{
        if(btn.dataset.breast === selectedBreast) btn.classList.add("active");
      });
    }

    if(activeFeeding){
      document.getElementById("feedTimerBox").style.display = "block";
      document.getElementById("feedStartBtn").style.display = "none";
      document.getElementById("feedStopBtn").style.display = "block";
      document.getElementById("feedEndRow").style.display = "none";
    }else{
      document.getElementById("feedTimerBox").style.display = "none";
      document.getElementById("feedStartBtn").style.display = "block";
      document.getElementById("feedStopBtn").style.display = "none";
      document.getElementById("feedEndRow").style.display = "none";
    }
  }

  document.querySelectorAll("#breastBtns .toggle").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      clearBreastSelection("breastBtns");
      btn.classList.add("active");
      selectedBreast = btn.dataset.breast;
    });
  });

  document.getElementById("feedStartBtn").addEventListener("click", ()=>{
    if(activeFeeding) return;
    if(!selectedBreast) return alert("Odaberi dojku (Lijeva/Desna/Obje).");
    const ms = dateClockToMs(
      document.getElementById("feedStartDate").value,
      document.getElementById("feedStartClock").value
    );
    if(ms===null) return alert("Unesi ispravno vrijeme (HH:MM:SS) i datum.");
    if(ms > Date.now() + 1000) return alert("Početak ne može biti u budućnosti.");

    activeFeeding = { startMs: ms, startIso: msToISO(ms), breast: selectedBreast };
    saveActive();
    updateDisplay();
    setupFeedModal();
  });

  document.getElementById("feedStopBtn").addEventListener("click", ()=>{
    if(!activeFeeding) return;
    const endMs = Date.now();
    if(endMs <= activeFeeding.startMs) return alert("Greška u vremenima.");
    const a = {
      id: uid(),
      type: "feeding",
      breast: activeFeeding.breast,
      startMs: activeFeeding.startMs,
      endMs,
      startIso: activeFeeding.startIso,
      endIso: msToISO(endMs),
      notes: document.getElementById("feedNotes").value || "",
      createdAt: Date.now()
    };
    activities.push(a);
    activeFeeding = null;
    saveActs();
    saveActive();
    updateDisplay();
    closeModal("feedModal");
  });

  // ---- Edit / Delete ----
  function findAct(id){ return activities.find(a=>a.id===id); }
  function setupEditModal(){
    const a = findAct(editId);
    if(!a) return closeModal("editModal");
    document.getElementById("editType").value = a.type === "sleep" ? "San" : "Hranjenje";
    document.getElementById("editStartDate").value = msToDate(a.startMs);
    document.getElementById("editStartClock").value = msToClock(a.startMs);
    document.getElementById("editEndDate").value = msToDate(a.endMs);
    document.getElementById("editEndClock").value = msToClock(a.endMs);
    document.getElementById("editNotes").value = a.notes || "";

    if(a.type==="feeding"){
      document.getElementById("editBreastGroup").style.display = "block";
      editBreast = a.breast;
      clearBreastSelection("editBreastBtns");
      document.querySelectorAll("#editBreastBtns .toggle").forEach(btn=>{
        if(btn.dataset.breast === editBreast) btn.classList.add("active");
      });
    }else{
      document.getElementById("editBreastGroup").style.display = "none";
      editBreast = null;
    }
  }

  document.querySelectorAll("#editBreastBtns .toggle").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      clearBreastSelection("editBreastBtns");
      btn.classList.add("active");
      editBreast = btn.dataset.breast;
    });
  });

  document.getElementById("editSaveBtn").addEventListener("click", ()=>{
    const a = findAct(editId);
    if(!a) return;
    const startMs = dateClockToMs(document.getElementById("editStartDate").value, document.getElementById("editStartClock").value);
    const endMs = dateClockToMs(document.getElementById("editEndDate").value, document.getElementById("editEndClock").value);
    if(startMs===null || endMs===null) return alert("Unesi ispravne datume i vremena (HH:MM:SS).");
    if(endMs <= startMs) return alert("Kraj mora biti poslije početka.");

    a.startMs = startMs;
    a.endMs = endMs;
    a.startIso = msToISO(startMs);
    a.endIso = msToISO(endMs);
    a.notes = document.getElementById("editNotes").value || "";
    if(a.type==="feeding"){
      if(!editBreast) return alert("Odaberi dojku.");
      a.breast = editBreast;
    }
    saveActs();
    updateDisplay();
    closeModal("editModal");
  });

  document.getElementById("editDeleteBtn").addEventListener("click", ()=>{
    if(!confirm("Obrisati zapis?")) return;
    activities = activities.filter(a=>a.id!==editId);
    saveActs();
    updateDisplay();
    closeModal("editModal");
  });

  // Click handlers for edit/delete in lists
  document.addEventListener("click", (e)=>{
    const edit = e.target.closest("[data-edit]");
    const del = e.target.closest("[data-del]");
    if(edit){
      editId = edit.dataset.edit;
      openModal("editModal");
    }
    if(del){
      const id = del.dataset.del;
      if(!confirm("Obrisati zapis?")) return;
      activities = activities.filter(a=>a.id!==id);
      saveActs();
      updateDisplay();
    }
  });

  // ---- Navigation ----
  function showHistory(show){
    document.getElementById("historySection").style.display = show ? "block" : "none";
    document.getElementById("homeNow").style.display = show ? "none" : "block";
    document.querySelector(".grid2").style.display = show ? "none" : "grid";
    window.scrollTo({top:0, behavior:"instant"});
  }
  document.getElementById("btnHistory").addEventListener("click", ()=> showHistory(true));
  document.getElementById("viewAll").addEventListener("click", ()=> showHistory(true));
  document.getElementById("backHome").addEventListener("click", ()=> showHistory(false));

  // ---- Export JSON ----
  document.getElementById("btnExport").addEventListener("click", ()=>{
    const payload = {
      exportedAt: new Date().toISOString(),
      activeSleep, activeFeeding,
      activities
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type:"application/json"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `nori_export_${Date.now()}.json`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  });

  // ---- Open modals ----
  document.getElementById("openSleep").addEventListener("click", ()=> openModal("sleepModal"));
  document.getElementById("openFeed").addEventListener("click", ()=> openModal("feedModal"));

  // Init
  updateDisplay();
  ensureIntervals();
</script>
</body>
</html>
